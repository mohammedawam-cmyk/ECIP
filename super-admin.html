<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0f;color:#e8e8e6;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:12px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:#0d0d0f;display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{width:380px;padding:40px;background:#111113;border:1px solid #222;border-radius:20px}
.login-logo{font-size:26px;font-weight:900;color:#1D9E75;letter-spacing:-1px;margin-bottom:6px}
.login-sub{font-size:11px;color:#555;margin-bottom:32px}
.login-label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.login-input{width:100%;background:#1a1a1c;border:1px solid #2a2a2c;border-radius:8px;padding:10px 12px;font-size:13px;color:#e8e8e6;outline:none;margin-bottom:16px;transition:border-color .15s}
.login-input:focus{border-color:#1D9E75}
.login-btn{width:100%;padding:12px;background:#1D9E75;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s}
.login-btn:hover{background:#17855f}
.login-error{color:#ef4444;font-size:11px;margin-top:8px;display:none}
/* APP */
#app{display:none;flex-direction:column;height:100vh}
/* TOP BAR */
.topbar{background:#111113;border-bottom:1px solid #1e1e20;height:50px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;gap:0}
.logo{font-size:15px;font-weight:900;color:#1D9E75;letter-spacing:-.5px;margin-right:20px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.logo-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75}
.logo-badge{font-size:9px;background:#1D9E75;color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.04em}
.tab-nav{display:flex;height:50px;overflow-x:auto;flex:1}
.tab-nav::-webkit-scrollbar{display:none}
.nav-tab{height:50px;padding:0 14px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:700;color:#555;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .15s}
.nav-tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
.nav-tab:hover{color:#888}
.user-area{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;padding-left:16px}
.user-pill{background:#1a1a1c;border:1px solid #2a2a2c;border-radius:20px;padding:4px 12px;font-size:10px;color:#888;font-weight:600}
.user-avatar{width:30px;height:30px;border-radius:50%;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;background:#ef4444;color:#fff}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.card{background:#111113;border:1px solid #1e1e20;border-radius:12px;padding:16px}
.card-dark{background:#0d0d0f;border:1px solid #1e1e20;border-radius:10px;padding:12px}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.stat{background:#111113;border:1px solid #1e1e20;border-radius:12px;padding:14px 16px}
.stat-val{font-size:26px;font-weight:800;font-family:monospace;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em}
.stat-sub{font-size:10px;color:#444;margin-top:2px}
/* TAGS */

.tag-green{background:#1D9E7520;color:#1D9E75;border:1px solid #1D9E7540}
.tag-red{background:#ef444420;color:#ef4444;border:1px solid #ef444440}
.tag-amber{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40}
.tag-blue{background:#3b82f620;color:#3b82f6;border:1px solid #3b82f640}
.tag-purp{background:#8b5cf620;color:#8b5cf6;border:1px solid #8b5cf640}
.tag-gray{background:#33333380;color:#888;border:1px solid #33333380}
/* BUTTONS */
.btn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid #333;background:#1a1a1c;color:#ccc;transition:all .15s;cursor:pointer}
.btn:hover{background:#222;color:#fff}
.btn-primary{background:#1D9E75;color:#fff;border:none}

.btn-sm{padding:3px 9px;font-size:10px}
.btn-ghost{background:transparent;border:1px solid #2a2a2c;color:#666}

.sh-title{font-size:13px;font-weight:700;color:#e8e8e6}
.sh-sub{font-size:10px;color:#555;margin-top:1px}
.fl{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.input{width:100%;background:#1a1a1c;border:1px solid #2a2a2c;border-radius:8px;padding:7px 10px;font-size:11px;color:#ccc;outline:none;transition:border-color .15s}

table{width:100%;border-collapse:collapse;font-size:11px}
th{font-size:9px;font-weight:700;color:#555;padding:6px 10px;border-bottom:1px solid #1e1e20;text-align:left;text-transform:uppercase;letter-spacing:.06em}
td{padding:8px 10px;border-bottom:1px solid #1a1a1c;color:#aaa}

.risk-high{color:#ef4444}.risk-medium{color:#f59e0b}.risk-stable{color:#1D9E75}.risk-top{color:#3b82f6}

const USERS = {
  'ruyuf.alqahtani@eyewa.com': { pass:'eyewa2026!', name:'Ruyuf Alqahtani', role:'Director', av:'RA', superAdmin:true },
  'wissam.haddad@eyewa.com':   { pass:'ecip2026',  name:'Wissam Haddad',    role:'Training Admin', av:'WH', superAdmin:false },
  'demo@eyewa.com':            { pass:'demo',       name:'Demo User',        role:'Viewer', av:'DU', superAdmin:false },
};

// Invited users stored in localStorage
function getInvited(){ try{return JSON.parse(localStorage.getItem('ecip_invited')||'[]')}catch(e){return[]} }
function saveInvited(arr){ localStorage.setItem('ecip_invited',JSON.stringify(arr)) }

let currentUser = null;

function tryLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  
  // Check base users
  let user = USERS[email];
  if(!user){
    // Check invited users
    const invited = getInvited();
    const inv = invited.find(u=>u.email===email&&u.pass===pass);
    if(inv) user = {pass:inv.pass,name:inv.name,role:inv.role,av:inv.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(),superAdmin:false};
  }
  
  if(user && user.pass===pass){
    currentUser = {...user, email};
    err.style.display='none';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('user-pill').textContent = currentUser.name + ' · ' + currentUser.role;
    document.getElementById('user-avatar').textContent = currentUser.av;
    initApp();
  } else {
    err.style.display='block';
    document.getElementById('login-pass').style.borderColor='#ef4444';
  }
}
document.getElementById('login-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('login-email').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('login-pass').focus(); });

function logout(){
  currentUser = null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
}

function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function') el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='class') el.className=v;
    else if(k==='html') el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).flat(Infinity).filter(c=>c!=null&&c!==false).forEach(c=>{
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return el;
}
const div=(a,...c)=>h('div',a,...c.flat());
const span=(a,...c)=>h('span',a,...c.flat());
const btn=(text,cls,onclick)=>{ const b=h('button',{class:'btn '+cls,onClick:onclick}); b.innerHTML=text; return b; };
const tag=(text,cls='gray')=>span({class:`tag tag-${cls}`},text);
function initials(name){ return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }
function pctColor(p){ return p>=80?'#1D9E75':p>=60?'#f59e0b':'#ef4444'; }
function barEl(val,max,color,height=4){
  return div({style:{height:height+'px',background:'#1e1e20',borderRadius:'2px',overflow:'hidden'}},
    div({style:{height:'100%',width:Math.min(100,(val/max)*100)+'%',background:color,borderRadius:'2px'}}));
}

  TABS.forEach(t=>{
    if(t.id==='access' && !currentUser.superAdmin) return;
    const tb = h('button',{class:`nav-tab${S.tab===t.id?' active':''}`,onClick:()=>{ S.tab=t.id; render(); }},t.l);
    nav.appendChild(tb);
  });
  render();
}

function render(){
  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(tb=>{
    tb.classList.toggle('active', tb.textContent.trim()===TABS.find(t=>t.id===S.tab)?.l.trim());
  });
  // Rebuild nav properly
  const nav = document.getElementById('tab-nav');
  nav.innerHTML='';
  TABS.forEach(t=>{
    if(t.id==='access'&&!currentUser.superAdmin) return;
    const tb=h('button',{class:`nav-tab${S.tab===t.id?' active':''}`,onClick:()=>{S.tab=t.id;render();}},t.l);
    nav.appendChild(tb);
  });

  const main = document.getElementById('main-content');
  main.innerHTML='';
  
  if(S.tab==='dashboard') main.appendChild(renderDashboard());
  else if(S.tab==='stores') main.appendChild(renderStores());
  else if(S.tab==='people') main.appendChild(renderPeople());
  else if(S.tab==='actions') main.appendChild(renderActions());
  else if(S.tab==='content') main.appendChild(renderContentAI());
  else if(S.tab==='access') main.appendChild(renderAccess());
  else if(S.tab==='reports') main.appendChild(renderReports());
}

    const inner = div({style:{display:'flex',alignItems:'flex-start',gap:'12px'}});
    inner.appendChild(div({style:{width:'32px',height:'32px',borderRadius:'8px',background:a.color+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',flexShrink:'0'}},a.icon));
    inner.appendChild(div({style:{flex:'1'}},
      div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'3px'}},
        span({style:{fontSize:'12px',fontWeight:'700',color:'#ccc'}},a.issue),
        span({class:`tag tag-${a.priority==='critical'?'red':a.priority==='high'?'amber':'blue'}`},a.priority)
      ),
      div({style:{fontSize:'10px',color:'#555'}},`${a.store} · ${a.region} · SM: ${a.smName}`),
      div({style:{fontSize:'10px',color:'#666',marginTop:'2px'}},`📚 ${a.course} · Conversion gap: ${a.gap}pts below target`)
    ));
    inner.appendChild(div({style:{flexShrink:'0',display:'flex',gap:'6px'}},
      btn('Assign','btn-sm btn-primary',()=>alert(`Assign trainer to ${a.store} for ${a.issue}`)),
      btn('Schedule','btn-sm btn-ghost',()=>alert(`Schedule session for ${a.store}`))
    ));
    row.appendChild(inner);
    wrap.appendChild(row);
  });
  return wrap;
}

// CONTENT AI (Baseer Agent)
// ═══════════════════════════════════════
function renderContentAI(){
  const wrap = div({});
  const CLAUDE_API_URL = 'https://api.anthropic.com/v1/messages';

  wrap.appendChild(div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}},
    div({},
      div({style:{fontSize:'16px',fontWeight:'800',color:'#e8e8e6'}},'🤖 Baseer — Content AI Agent'),
      div({style:{fontSize:'10px',color:'#555',marginTop:'1px'}},'AI-powered training content generation · powered by Claude')
    ),
    span({class:'tag tag-green'},'Agent active')
  ));

  // Quick prompts
  const qPrompts = div({style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'14px'}});
  const prompts = [
    'Generate a 10-question quiz on insurance handling for Sales Advisors',
    'Write 5 golden selling sentences for CLARIVO progressive lenses in Arabic and English',
    'Create a WhatsApp announcement for a session on objection handling',
    'Write a trainer guide for a 60-min discovery skills session',
    'List the top 5 objections customers raise about lens upgrades and how to handle them',
    'Create an onboarding checklist for a new Sales Advisor joining eyewa',
  ];
  prompts.forEach(p=>{
    const pb = h('button',{style:{padding:'6px 10px',borderRadius:'20px',fontSize:'10px',fontWeight:'600',cursor:'pointer',border:'1px solid #2a2a2c',background:'transparent',color:'#666',transition:'all .15s'},onClick:()=>{ document.getElementById('ai-input').value=p; }},p.substring(0,42)+'…');
    pb.onmouseenter=()=>{pb.style.borderColor='#1D9E75';pb.style.color='#1D9E75';};
    pb.onmouseleave=()=>{pb.style.borderColor='#2a2a2c';pb.style.color='#666';};
    qPrompts.appendChild(pb);
  });
  wrap.appendChild(qPrompts);

  // Chat window
  const chatBox = div({style:{background:'#0d0d0f',border:'1px solid #1e1e20',borderRadius:'14px',padding:'16px',marginBottom:'12px',minHeight:'320px',maxHeight:'480px',overflowY:'auto'}});
  chatBox.id = 'ai-chatbox';

  if(S.aiMessages.length===0){
    chatBox.appendChild(div({style:{textAlign:'center',padding:'40px 20px'}},
      div({style:{fontSize:'40px',marginBottom:'12px'}},'🤖'),
      div({style:{fontSize:'16px',fontWeight:'700',color:'#ccc',marginBottom:'6px'}},'Baseer is ready'),
      div({style:{fontSize:'11px',color:'#555',maxWidth:'340px',margin:'0 auto',lineHeight:'1.7'}},'Ask Baseer to generate quizzes, course summaries, WhatsApp messages, role-play scenarios, or any training content. Available in English and Arabic.')
    ));
  } else {
    S.aiMessages.forEach(msg=>{
      const bubble = div({class:`ai-bubble ${msg.role==='assistant'?'ai':'user-msg'}`});
      if(msg.role==='assistant'){
        bubble.appendChild(div({style:{fontSize:'9px',fontWeight:'700',color:'#1D9E75',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.06em'}},'🤖 Baseer'));
        bubble.appendChild(div({style:{fontSize:'11px',color:'#ccc',lineHeight:'1.8',whiteSpace:'pre-wrap'}},msg.content));
      } else {
        bubble.appendChild(div({style:{fontSize:'9px',fontWeight:'700',color:'#555',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'.06em'}},`You · ${currentUser.name}`));
        bubble.appendChild(div({style:{fontSize:'11px',color:'#888',lineHeight:'1.6'}},msg.content));
      }
      chatBox.appendChild(bubble);
    });
    if(S.aiLoading){
      const typing = div({class:'ai-bubble ai'});
      typing.appendChild(div({class:'ai-typing'},div({class:'ai-dot'}),div({class:'ai-dot'}),div({class:'ai-dot'})));
      chatBox.appendChild(typing);
    }
  }
  wrap.appendChild(chatBox);

  // Input
  const inputRow = div({style:{display:'flex',gap:'8px'}});
  const textarea = h('textarea',{id:'ai-input',class:'input',placeholder:'Ask Baseer to generate training content...',style:{flex:'1',minHeight:'52px',resize:'none',lineHeight:'1.6'}});
  textarea.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendAI(); } });

  const sendBtn = btn('Generate →','btn-primary',sendAI);
  sendBtn.style.cssText='height:52px;padding:0 20px;font-size:12px;white-space:nowrap;flex-shrink:0';

  inputRow.appendChild(textarea);
  inputRow.appendChild(sendBtn);
  wrap.appendChild(inputRow);
  wrap.appendChild(div({style:{fontSize:'10px',color:'#333',marginTop:'8px',textAlign:'center'}},'Baseer uses Claude AI · Press Enter to send · Shift+Enter for new line'));

  async function sendAI(){
    const input = document.getElementById('ai-input');
    const msg = (input?.value||'').trim();
    if(!msg||S.aiLoading) return;
    
    input.value='';
    S.aiMessages.push({role:'user',content:msg});
    S.aiLoading=true;
    render(); // Show typing

    // Scroll to bottom
    setTimeout(()=>{ const cb=document.getElementById('ai-chatbox'); if(cb) cb.scrollTop=cb.scrollHeight; },50);

    try {
      const response = await fetch(CLAUDE_API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key': window.ANTHROPIC_KEY||''},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1500,
          system:`You are Baseer, an expert training content generator for eyewa — a premium optical retail chain across Saudi Arabia, UAE and the GCC. You specialise in creating:
- Training quizzes and assessments
- WhatsApp learning announcements  
- Role-play scenarios for sales training
- Trainer guides and session plans
- Course summaries (EN + AR when requested)
- Golden selling sentences and objection handling scripts

eyewa sells: prescription glasses, sunglasses, contact lenses, CLARIVO lenses (single vision & progressive), OPTICORE optical solutions, and premium eyewear brands. 

Key roles: Sales Advisor (SA), Senior SA, Store Incharge (SIC), Store Manager (SM), Optician, Optometrist, Optical Technician.

Key KPIs: Conversion Rate (target 55%), AOV, UPT, Insurance Attachment Rate, Lens Upgrade Rate, Eye Test Conversion.

Be specific to eyewa context. Format output clearly with sections when appropriate. For Arabic content, use formal Modern Standard Arabic.`,
          messages: S.aiMessages.map(m=>({role:m.role,content:m.content}))
        })
      });
      
      const data = await response.json();
      
      if(data.error){
        // Fallback - demo mode
        S.aiMessages.push({role:'assistant',content:getDemoResponse(msg)});
      } else {
        const reply = data.content?.[0]?.text || 'Sorry, I could not generate a response.';
        S.aiMessages.push({role:'assistant',content:reply});
      }
    } catch(e) {
      // Demo mode fallback
      S.aiMessages.push({role:'assistant',content:getDemoResponse(msg)});
    }
    S.aiLoading=false;
    render();
    setTimeout(()=>{ const cb=document.getElementById('ai-chatbox'); if(cb) cb.scrollTop=cb.scrollHeight; },50);
  }

  function getDemoResponse(msg){
    const q = msg.toLowerCase();
    if(q.includes('quiz')&&q.includes('insurance')){
      return `📋 **10-Question Quiz: Insurance Silence Protocol**\n\nFor: Sales Advisors · Pass Score: 80%\n\n1. What is the first step when a customer says "I don't have insurance"?\na) Offer a discount  b) Apply the Silence Protocol  c) Move to a different product  d) Skip insurance conversation\n✓ Answer: b\n\n2. How many seconds of silence should you hold after presenting the insurance option?\na) 3 seconds  b) 5 seconds  c) 10 seconds  d) 15 seconds\n✓ Answer: b\n\n3. Which phrase best introduces insurance without pressure?\na) "You need insurance"  b) "Insurance is expensive but..."  c) "Most of our customers protect their lenses — shall I add it?"  d) "Would you like to buy insurance?"\n✓ Answer: c\n\n4. If a customer says "I'll think about it" regarding insurance, you should:\na) Drop the subject  b) Acknowledge and revisit once at checkout  c) Insist immediately  d) Offer a refund\n✓ Answer: b\n\n5. What is eyewa's target Insurance Attachment Rate?\na) 20%  b) 35%  c) 50%  d) 70%\n✓ Answer: c\n\n[+ 5 more questions available · Full quiz in LearnLab]`;
    }
    if(q.includes('whatsapp')||q.includes('announcement')){
      return `📱 **WhatsApp Announcement · Session Reminder**\n\n🌟 *eyewa Training Alert*\n\nDear Team 👋\n\nYour trainer will be visiting your store this week for a focused coaching session:\n\n📚 *Topic:* ${q.includes('object')?'Objection Handling':'Discovery & Frame Styling'}\n📅 *Date:* [DATE]\n⏰ *Time:* [TIME]\n📍 *Location:* Your store floor\n\n*Please make sure to:*\n✅ Be punctual\n✅ Bring your learning journal\n✅ Come ready with 2 customer scenarios from this week\n\nThis session will directly impact your conversion scores and LearnLab points 🎯\n\n*See you there!*\neyewa Training Team 🎓\n\n---\n🇦🇪 *Arabic Version:*\n\nعزيزي الفريق 👋\nسيزور مدرّبك متجرك هذا الأسبوع لجلسة تدريبية مركّزة حول موضوع [الموضوع]. التاريخ: [التاريخ] ⏰ [الوقت] 📍 متجركم.\nيُرجى الحضور في الوقت المحدد ومعكم دفتر التعلّم. نراكم هناك! 🎓`;
    }
    if(q.includes('golden')||q.includes('selling sentence')){
      return `⭐ **5 Golden Selling Sentences — CLARIVO Progressive Lenses**\n\n1. *"These lenses are engineered for people who refuse to compromise — crystal clear for reading, distance, and everything in between."*\n\n2. *"Imagine never switching between glasses again — CLARIVO gives you one perfect pair for your whole day."*\n\n3. *"Our optometrist actually recommends these for your prescription — let me show you the difference on this demo lens."*\n\n4. *"Most customers who try CLARIVO never go back to single vision — shall we let your eyes decide?"*\n\n5. *"This is the lens that's changed how our customers see the world — literally."*\n\n---\n📌 **Coaching note:** Pair each sentence with a pause. Let the customer respond. Don't rush to the price — let the value land first.`;
    }
    return `🤖 **Baseer Response**\n\nI've generated a response for: "${msg}"\n\n**Note:** This is running in demo mode. To enable real AI generation:\n\n1. Open the HTML file\n2. Find the line: window.ANTHROPIC_KEY\n3. Set it to your Anthropic API key\n\nIn production, Baseer generates full training content including quizzes, course summaries, role-play scenarios, trainer guides, WhatsApp messages, and bilingual content (EN + AR).\n\nWould you like me to demonstrate with a specific content type?`;
  }

  return wrap;
}

function renderAccess(){
  const invited = getInvited();
  const allUsers = [
    {name:'Ruyuf Alqahtani',email:'ruyuf.alqahtani@eyewa.com',role:'Director',access:'Super Admin',status:'active',av:'RA',color:'#1D9E75'},
    {name:'Wissam Haddad',email:'wissam.haddad@eyewa.com',role:'Training Admin',access:'Training Admin',status:'active',av:'WH',color:'#3b82f6'},

    ['Training Admin','✅','✅','✅','✅','✅','—','✅'],

    capBody.appendChild(h('tr',{},
      h('td',{},span({style:{color:clr,fontWeight:'700',fontSize:'11px'}},role)),
      ...caps.map(c=>h('td',{style:{color:c==='✅'?'#1D9E75':c==='—'?'#333':'#888',textAlign:'center'}},c))
    ));
  });
  capTbl.appendChild(capBody);

  wrap.appendChild(capCard);

  // Users list
  const usersCard = div({class:'card'});
  usersCard.appendChild(div({class:'sh'},div({},div({class:'sh-title'},'Active users & invited'),div({class:'sh-sub'},`${allUsers.length} total`))));

  allUsers.forEach(u=>{
    const row = div({class:'access-card',style:{marginBottom:'8px'}});
    const av = div({class:'access-avatar',style:{background:u.color+'30',color:u.color}},u.av);
    row.appendChild(av);
    row.appendChild(div({style:{flex:'1'}},
      div({style:{fontSize:'12px',fontWeight:'700',color:'#ccc',marginBottom:'2px'}},u.name),
      div({style:{fontSize:'10px',color:'#555'}},u.email+' · '+u.role)
    ));
    row.appendChild(span({class:`tag tag-${u.status==='active'?'green':'amber'}`},u.status==='active'?'Active':'Invited'));
    row.appendChild(span({style:{fontSize:'9px',padding:'2px 8px',borderRadius:'8px',background:u.color+'20',color:u.color,fontWeight:'700',marginLeft:'6px'}},u.access||u.role));
    if(u.status==='invited'&&currentUser.superAdmin){
      row.appendChild(btn('Revoke','btn-sm btn-danger',()=>{
        const inv=getInvited().filter(i=>i.email!==u.email);
        saveInvited(inv);
        render();
      }));
    }
    usersCard.appendChild(row);
  });
  wrap.appendChild(usersCard);

  // Invite modal
  function showInviteModal(){
    const overlay = div({class:'modal',onClick:e=>{if(e.target===overlay)overlay.remove();}});
    const box = div({class:'modal-box'});
    box.appendChild(h('div',{style:{fontSize:'16px',fontWeight:'800',color:'#e8e8e6',marginBottom:'4px'}},'Invite user'));
    box.appendChild(h('div',{style:{fontSize:'10px',color:'#555',marginBottom:'20px'}},'They will receive an email with login details (in production)'));

    const fields = [['Name','text','Full name','inv-name'],['Email','email','user@eyewa.com','inv-email'],['Temporary password','text','Set a password','inv-pass']];
    fields.forEach(([lbl,type,ph,id])=>{
      box.appendChild(h('div',{class:'fl',style:{marginTop:'12px'}},lbl));
      box.appendChild(h('input',{type,class:'input',id,placeholder:ph}));
    });

    box.appendChild(h('div',{class:'fl',style:{marginTop:'12px'}},'Access level'));
    const roleSelect = h('select',{class:'input',style:{marginBottom:'16px'}});
    ['Training Admin','RTM Regional','Viewer'].forEach(r=>{ roleSelect.appendChild(h('option',{value:r},r)); });
    box.appendChild(roleSelect);

    const actRow = div({style:{display:'flex',gap:'8px',marginTop:'16px'}});
    actRow.appendChild(btn('Send invite','btn-primary',()=>{
      const name=document.getElementById('inv-name')?.value?.trim();
      const email=document.getElementById('inv-email')?.value?.trim()?.toLowerCase();
      const pass=document.getElementById('inv-pass')?.value?.trim();
      const role=roleSelect.value;
      if(!name||!email||!pass){alert('All fields required');return;}
      const invited=getInvited();
      if(invited.find(u=>u.email===email)){alert('User already invited');return;}
      invited.push({name,email,pass,role,access:role,invitedBy:currentUser.name,invitedAt:new Date().toISOString()});
      saveInvited(invited);
      overlay.remove();
      render();
      alert(`✅ ${name} has been invited as ${role}.\n\nLogin credentials:\nEmail: ${email}\nPassword: ${pass}\n\nShare these with ${name.split(' ')[0]}.`);
    }));
    actRow.appendChild(btn('Cancel','btn-ghost',()=>overlay.remove()));
    box.appendChild(actRow);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  }

  return wrap;
}

// ═══════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════
function renderReports(){
  const wrap = div({});
  wrap.appendChild(div({style:{fontSize:'16px',fontWeight:'800',color:'#e8e8e6',marginBottom:'4px'}},'Reports & Analytics'));
  wrap.appendChild(div({style:{fontSize:'10px',color:'#555',marginBottom:'16px'}},'KSA-wide training performance · Real store data from HRIS'));

  // Summary stats
  const regions = {};
  STORES.forEach(s=>{
    if(!regions[s.region]) regions[s.region]={stores:0,staff:0,highRisk:0,avgConv:0,mandatory:0};
    regions[s.region].stores++;
    regions[s.region].staff+=s.staffCount;
    regions[s.region].mandatory+=s.mandatoryPct;
    regions[s.region].avgConv+=s.conv.current;
    if(s.riskLevel==='high_risk') regions[s.region].highRisk++;
  });

  const regCard = div({class:'card',style:{marginBottom:'12px'}});
  regCard.appendChild(div({class:'sh'},div({},div({class:'sh-title'},'Region performance matrix'),div({class:'sh-sub'},'Live data · conversion vs target 55%'))));
  
  const regTbl = h('table',{});
  regTbl.appendChild(h('thead',{},h('tr',{},...['Region','Stores','Staff','Avg Conv','Mandatory %','High Risk','Health'].map(col=>h('th',{},col)))));
  const regBody = h('tbody',{});
  
  Object.entries(regions).sort((a,b)=>b[1].stores-a[1].stores).slice(0,8).forEach(([reg,d])=>{
    const avgC = Math.round(d.avgConv/d.stores);
    const avgM = Math.round(d.mandatory/d.stores);
    const health = avgC>=55&&d.highRisk===0?'🟢 Healthy':avgC>=48&&d.highRisk<=2?'🟡 Watch':'🔴 At risk';
    regBody.appendChild(h('tr',{},
      h('td',{style:{fontWeight:'700',color:'#ccc'}},reg),
      h('td',{},String(d.stores)),
      h('td',{},String(d.staff)),
      h('td',{},span({style:{color:pctColor(avgC),fontWeight:'700',fontFamily:'monospace'}},avgC+'%')),
      h('td',{},span({style:{color:pctColor(avgM),fontWeight:'700',fontFamily:'monospace'}},avgM+'%')),
      h('td',{},d.highRisk>0?span({style:{color:'#ef4444',fontWeight:'700'}},String(d.highRisk)):span({style:{color:'#555'}},'0')),
      h('td',{},health)
    ));
  });
  regTbl.appendChild(regBody);
  regCard.appendChild(regTbl);
  wrap.appendChild(regCard);

  // Role distribution
  const allEmps = STORES.flatMap(s=>s.employees);
  const roleCounts = {};
  allEmps.forEach(e=>{ roleCounts[e.role]=(roleCounts[e.role]||0)+1; });
  
  const roleCard = div({class:'card',style:{marginBottom:'12px'}});
  roleCard.appendChild(div({class:'sh'},div({},div({class:'sh-title'},'Workforce breakdown'),div({class:'sh-sub'},`${allEmps.length} employees across ${STORES.length} stores`))));
  Object.entries(roleCounts).sort((a,b)=>b[1]-a[1]).forEach(([role,count])=>{
    const pct = Math.round((count/allEmps.length)*100);
    const row = div({style:{padding:'6px 0',borderBottom:'1px solid #1a1a1c'}});
    const lbl = div({style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}});
    lbl.appendChild(span({style:{fontSize:'11px',color:'#aaa'}},role));
    lbl.appendChild(span({style:{fontSize:'11px',fontWeight:'700',color:'#ccc',fontFamily:'monospace'}},`${count} (${pct}%)`));
    row.appendChild(lbl);
    row.appendChild(barEl(count,allEmps.length,'#1D9E75',4));
    roleCard.appendChild(row);
  });
  wrap.appendChild(roleCard);

  return wrap;
}
