<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eyewa ECIP — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--bg2:#EDE8DC;--bg3:#E4DDD0;
  --card:#FFFFFF;--card2:#FAFAF7;
  --border:#DDD5C4;--border2:#C8BFA8;
  --g:#1DB954;--gd:#158A3E;--gl:rgba(29,185,84,.1);--gb:rgba(29,185,84,.22);
  --t1:#18181A;--t2:#44444C;--t3:#767676;--t4:#ABABAB;
  --red:#D93025;--redbg:rgba(217,48,37,.08);
  --amb:#C07818;--ambbg:rgba(192,120,24,.08);
  --blue:#1A56DB;--bluebg:rgba(26,86,219,.08);
  --purp:#7C3AED;--purpbg:rgba(124,58,237,.08);
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);
  --shm:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
  --ease:cubic-bezier(.16,1,.3,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .18s var(--ease)}
input,select,textarea{font-family:inherit;outline:none;transition:all .15s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes in{from{opacity:0}to{opacity:1}}
@keyframes sc{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes sh{0%{background-position:-400px 0}to{background-position:400px 0}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.au{animation:up .4s var(--ease) both}
.af{animation:in .25s var(--ease) both}
.as{animation:sc .28s var(--ease) both}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;background-image:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(29,185,84,.1) 0%,transparent 60%)}
.lb{width:400px;animation:up .5s var(--ease)}
.lb-brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.lb-icon{width:34px;height:34px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(29,185,84,.32)}
.lb-icon svg{width:17px;height:17px;fill:#fff}
.lb-name{font-size:20px;font-weight:800;letter-spacing:-.4px}
.lb-badge{font-size:9px;background:var(--gl);color:var(--g);padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.07em;border:1px solid var(--gb);text-transform:uppercase}
.lb-sub{font-size:11px;color:var(--t3);margin-bottom:36px;padding-left:44px}
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;box-shadow:var(--shm)}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.li{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--t1)}
.li:focus{border-color:var(--g);background:var(--card);box-shadow:0 0 0 3px var(--gl)}
.li::placeholder{color:var(--t4)}
.le{display:none;font-size:11px;color:var(--red);margin-bottom:12px;background:var(--redbg);padding:7px 11px;border-radius:7px;border-left:3px solid var(--red)}
.lbtn{width:100%;padding:12px;background:var(--g);border-radius:9px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(29,185,84,.32)}
.lbtn:hover{background:var(--gd);transform:translateY(-1px);box-shadow:0 5px 18px rgba(29,185,84,.4)}
.lft{margin-top:18px;font-size:10px;color:var(--t4);text-align:center}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0;box-shadow:var(--sh);z-index:10;position:relative}
.tb-brand{display:flex;align-items:center;gap:8px;margin-right:24px;flex-shrink:0;text-decoration:none}
.tb-icon{width:26px;height:26px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(29,185,84,.28)}
.tb-icon svg{width:13px;height:13px;fill:#fff}
.tb-wordmark{font-size:13px;font-weight:800;letter-spacing:-.3px;color:var(--t1)}
.tb-pill{font-size:9px;background:var(--gl);color:var(--g);padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.07em;border:1px solid var(--gb)}
.tb-nav{display:flex;height:52px;flex:1;overflow-x:auto}.tb-nav::-webkit-scrollbar{display:none}
.tb-tab{height:52px;padding:0 14px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:600;color:var(--t3);white-space:nowrap;display:flex;align-items:center;gap:5px;letter-spacing:.01em}
.tb-tab:hover{color:var(--t2);background:rgba(29,185,84,.04)}
.tb-tab.on{color:var(--g);border-bottom-color:var(--g);font-weight:700}
.tb-tab .rd{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pu 2s infinite}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;padding-left:12px}
.tb-user{display:flex;align-items:center;gap:8px;padding:4px 11px 4px 4px;background:var(--bg2);border:1px solid var(--border);border-radius:20px}
.tb-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.tb-uname{font-size:11px;font-weight:600;color:var(--t2)}
.tb-role{font-size:9px;color:var(--t4)}
.sout{padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:20px;font-size:10px;font-weight:600;color:var(--t3)}
.sout:hover{border-color:var(--red);color:var(--red);background:var(--redbg)}
.main{flex:1;overflow-y:auto;padding:22px}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:400px 100%;animation:sh 1.5s infinite;border-radius:8px}

/* ── COMPONENTS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;box-shadow:var(--sh);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shm)}
.hero{background:linear-gradient(135deg,rgba(29,185,84,.07),rgba(29,185,84,.02));border:1px solid var(--gb);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(29,185,84,.09) 0%,transparent 70%);pointer-events:none}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;cursor:pointer;transition:all .2s var(--ease);box-shadow:var(--sh);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--sc,var(--g))}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shm)}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--sc,var(--t1));margin-bottom:5px}
.stat-l{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.stat-s{font-size:10px;color:var(--t4);margin-top:3px}
.sh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sh2-l h2{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sh2-l p{font-size:10px;color:var(--t3);margin-top:2px}
.tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap;letter-spacing:.02em}
.tg{background:var(--gl);color:var(--g);border:1px solid var(--gb)}
.tr{background:var(--redbg);color:var(--red);border:1px solid rgba(217,48,37,.2)}
.ta{background:var(--ambbg);color:var(--amb);border:1px solid rgba(192,120,24,.2)}
.tb2{background:var(--bluebg);color:var(--blue);border:1px solid rgba(26,86,219,.2)}
.tp{background:var(--purpbg);color:var(--purp);border:1px solid rgba(124,58,237,.2)}
.tx{background:var(--bg2);color:var(--t3);border:1px solid var(--border)}
.btn{padding:7px 14px;border-radius:9px;font-size:11px;font-weight:700;border:1px solid transparent;display:inline-flex;align-items:center;gap:5px;letter-spacing:.01em}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.bp{background:var(--g);color:#fff;box-shadow:0 2px 8px rgba(29,185,84,.28)}.bp:hover{background:var(--gd);box-shadow:0 4px 14px rgba(29,185,84,.38)}
.bg2{background:transparent;border-color:var(--border);color:var(--t3)}.bg2:hover{border-color:var(--border2);color:var(--t2);background:var(--bg2)}
.bd{background:var(--redbg);color:var(--red);border-color:rgba(217,48,37,.2)}.bd:hover{background:rgba(217,48,37,.14)}
.bsm{padding:4px 9px;font-size:10px}
.inp{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--t1)}
.inp:focus{border-color:var(--g);background:var(--card);box-shadow:0 0 0 3px var(--gl)}
.inp::placeholder{color:var(--t4)}
.si{position:relative;margin-bottom:13px}
.si svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;fill:var(--t4)}
.si-inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:8px 13px 8px 30px;font-size:12px;color:var(--t1);box-shadow:var(--sh)}
.si-inp:focus{border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}
.si-inp::placeholder{color:var(--t4)}
.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fl{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.08em}
.pill{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--t3);box-shadow:var(--sh)}
.pill:hover{border-color:var(--border2);color:var(--t2)}.pill.on{background:var(--g);color:#fff;border-color:var(--g);box-shadow:0 2px 7px rgba(29,185,84,.28)}
.pb{height:4px;background:var(--bg2);border-radius:4px;overflow:hidden}
.pbf{height:100%;border-radius:4px;transition:width .7s var(--ease)}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:7px;border-left:3px solid transparent;cursor:pointer;transition:all .2s var(--ease);box-shadow:var(--sh)}
.sc:hover{transform:translateX(2px);box-shadow:var(--shm)}
.sc.hr{border-left-color:var(--red)}.sc.med{border-left-color:var(--amb)}.sc.sta{border-left-color:var(--g)}.sc.top{border-left-color:var(--blue)}
.mo{position:fixed;inset:0;background:rgba(20,20,20,.5);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;animation:in .2s}
.mo-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:sc .26s var(--ease);box-shadow:var(--shm)}
.mo-box h3{font-size:16px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.mo-sub{font-size:11px;color:var(--t3);margin-bottom:18px}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.ma{display:flex;gap:7px;margin-top:20px}
.uc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:7px;transition:all .2s;box-shadow:var(--sh)}
.uc:hover{box-shadow:var(--shm)}
.uav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 7px rgba(0,0,0,.14)}
.ai-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;min-height:280px;max-height:420px;overflow-y:auto;padding:14px;margin-bottom:11px}
.ai-msg{border-radius:12px;padding:11px 14px;margin-bottom:9px;font-size:12px;line-height:1.75;animation:up .22s var(--ease)}
.ai-msg.ai{background:var(--card);border:1px solid var(--gb);border-left:3px solid var(--g)}
.ai-msg.user{background:var(--g);color:#fff;margin-left:36px}
.ai-author{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;color:var(--g)}
.ai-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--g);margin:0 2px;animation:pu 1s infinite}
.ai-dots span:nth-child(2){animation-delay:.2s}.ai-dots span:nth-child(3){animation-delay:.4s}
.qp{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.qpb{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--t2);box-shadow:var(--sh)}
.qpb:hover{border-color:var(--g);color:var(--g);background:var(--gl)}
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-ic{font-size:40px;margin-bottom:12px;opacity:.55}
.empty h4{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:5px}
.empty p{font-size:11px;line-height:1.6}
#toasts{position:fixed;bottom:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 15px;font-size:12px;font-weight:600;color:var(--t1);animation:up .28s var(--ease);display:flex;align-items:center;gap:8px;min-width:230px;max-width:340px;box-shadow:var(--shm);pointer-events:all}
.toast.ok{border-left:3px solid var(--g)}.toast.err{border-left:3px solid var(--red)}.toast.inf{border-left:3px solid var(--blue)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.div{height:1px;background:var(--border);margin:16px 0}
.rb{display:flex;align-items:center;gap:9px;padding:7px 8px;border-bottom:1px solid var(--bg2);cursor:pointer;transition:all .14s;border-radius:6px}
.rb:last-child{border-bottom:none}.rb:hover{background:var(--gl)}
.rb-n{font-size:11px;font-weight:600;flex:1}
.rb-v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;width:40px;text-align:right}
.pbar2{height:3px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:4px}
.pbar2f{height:100%;border-radius:3px;transition:width .7s var(--ease)}
</style>
</head>
<body>
<div id="toasts"></div>

<div id="login">
  <div class="lb">
    <div class="lb-brand">
      <div class="lb-icon"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></div>

<div id="app">

    <a class="tb-brand" href="#">
      <div class="tb-icon"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></div>

<script>
// ═══════════════════════════════════════════════════════
// eyewa ECIP Super Admin — Clean Build v4
// Backend: Google Sheets via Apps Script
// Every write action calls the API. No localStorage data.
// ═══════════════════════════════════════════════════════

const API = 'https://script.google.com/macros/s/AKfycbz9GOBhvUtpsBEAzWIDB4B0ENrGlOkS49cHmvuGBvU66fjW7CC6maysbuzD8YkTjpWt/exec';

// ── API ──────────────────────────────────────────────
async function call(action, data={}) {
  const GET = ['getStores','getSessions','getActions','getRequests','getUsers','getDashboard','ping'];
  try {
    if (GET.includes(action)) {
      const r = await fetch(`${API}?${new URLSearchParams({action,...data})}`);
      const j = await r.json();
      return j.ok ? j.data : null;
    } else {
      const r = await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,...data})});
      const j = await r.json();
      return j.ok ? j.data : null;
    }
  } catch(e) { console.warn('[API]',e.message); return null; }
}

// ── TOAST ────────────────────────────────────────────
function toast(msg, type='inf', ms=3500) {
  const ic = {ok:'✅',err:'❌',inf:'ℹ️'};
  const el = document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span style="font-size:14px">${ic[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.cssText='opacity:0;transform:translateY(5px);transition:all .3s';setTimeout(()=>el.remove(),300);},ms);
}

// ── META ─────────────────────────────────────────────
const GAP = {
  discovery_gap:      {l:'Discovery Gap',      c:'var(--red)',  t:'tr', i:'🎯'},
  objection_handling: {l:'Objection Handling', c:'var(--red)',  t:'tr', i:'🛡'},
  product_knowledge:  {l:'Product Knowledge',  c:'var(--amb)',  t:'ta', i:'📦'},
  engagement_gap:     {l:'Engagement Gap',      c:'var(--amb)',  t:'ta', i:'💬'},
  onboarding_gap:     {l:'Onboarding Gap',      c:'var(--purp)', t:'tp', i:'🆕'},
};
const RISK = {
  high_risk:    {l:'High Risk',     c:'var(--red)',  t:'tr', cls:'hr', s:'●'},
  medium:       {l:'Medium',        c:'var(--amb)',  t:'ta', cls:'med',s:'●'},
  stable:       {l:'Stable',        c:'var(--g)',    t:'tg', cls:'sta',s:'●'},
  top_performer:{l:'Top Performer', c:'var(--blue)', t:'tb2',cls:'top',s:'★'},
};
const ROLE = {
  super_admin:    {l:'Super Admin',    t:'tg'},
  training_admin: {l:'Training Admin', t:'tb2'},
  trainer:        {l:'Trainer',        t:'tg'},
  rtm:            {l:'RTM',            t:'ta'},
  viewer:         {l:'Viewer',         t:'tx'},
};
const TABS = [
  {id:'dash',  l:'Dashboard',  i:'◉'},
  {id:'stores',l:'All Stores', i:'⊞'},
  {id:'people',l:'People',     i:'◎'},
  {id:'acts',  l:'Actions',    i:'⚡', alert:true},
  {id:'ai',    l:'Baseer AI',  i:'✦'},

const mk=(t,a={})=>{const e=document.createElement(t);for(const[k,v]of Object.entries(a)){if(k==='html')e.innerHTML=v;else if(k==='cls')e.className=v;else if(k==='on')Object.entries(v).forEach(([ev,fn])=>e.addEventListener(ev,fn));else if(k==='sty')Object.assign(e.style,v);else e.setAttribute(k,v);}return e;};
const div=(a,h)=>{const e=mk('div',a);if(h)e.innerHTML=h;return e;};

async function doLogin() {
  const email=document.getElementById('lei').value.trim().toLowerCase();
  const pass=document.getElementById('lpi').value;
  const errEl=document.getElementById('lerr');
  const lBtn=document.querySelector('.lbtn');
  errEl.style.display='none';
  lBtn.textContent='Signing in...';lBtn.style.opacity='.7';lBtn.style.pointerEvents='none';

  let user = await call('login',{email,password:pass});

  if(!user) {
    const l=LOCAL[email];
    if(l&&l.p===pass) user={type:'user',name:l.n,email,role:l.r};
  }

  lBtn.textContent='Sign in →';lBtn.style.opacity='';lBtn.style.pointerEvents='';

  if(!user||!['super_admin','training_admin'].includes(user.role)){
    errEl.style.display='block';
    errEl.textContent=user?'⛔ This portal is for admins only.':'⚠ Incorrect credentials.';
    return;
  }

  CU={...user,ini:ini(user.name),rc:ROLE[user.role]?.t||'tg',rl:ROLE[user.role]?.l||user.role};
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('av').textContent=CU.ini;
  document.getElementById('uname').textContent=CU.name;
  document.getElementById('urole').textContent=CU.rl;
  buildNav(); loadData(); render();
}
function doLogout(){
  CU=null;D={stores:null,sessions:null,actions:null,requests:null,users:null};UI.ai=[];
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lei').value='';document.getElementById('lpi').value='';
}
document.getElementById('lpi').onkeydown=e=>{if(e.key==='Enter')doLogin();};
document.getElementById('lei').onkeydown=e=>{if(e.key==='Enter')document.getElementById('lpi').focus();};

// ── DATA ─────────────────────────────────────────────
async function loadData() {
  const [stores,sessions,actions,requests,users]=await Promise.all([
    call('getStores'),call('getSessions'),call('getActions'),call('getRequests'),call('getUsers')
  ]);
  D.stores=(stores||[]).map(s=>({
    code:s.store_code,name:s.store_name,region:s.region,
    smName:s.sm_name||'',smEmail:s.sm_email||'',
    conv:{cur:Number(s.conv_current)||0,tgt:Number(s.conv_target)||55,prev:Number(s.conv_prev_week)||0},
    issues:(s.issues||'').split(',').filter(Boolean),
    risk:s.risk_level||'medium',
    mand:Number(s.mandatory_pct)||0,staff:Number(s.staff_count)||0,
  }));
  D.sessions=sessions||[];
  D.actions=actions||[];
  D.requests=requests||[];
  D.users=users||[];
  if(['dash','stores','access','rpts'].includes(TAB)) render();
}

// ── NAV ──────────────────────────────────────────────
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  TABS.forEach(t=>{
    if(t.admin&&CU?.role!=='super_admin') return;
    const b=mk('button',{cls:`tb-tab${TAB===t.id?' on':''}`});
    b.innerHTML=`${t.i} ${t.l}`;
    if(t.alert&&(D.actions||[]).some(a=>a.priority==='critical'&&(a.status||'open')==='open')){
      const dot=mk('span',{cls:'rd'}); b.appendChild(dot);
    }
    b.onclick=()=>{TAB=t.id;render();};
    nav.appendChild(b);
  });
}

function render(){
  buildNav();
  const m=document.getElementById('main');
  m.innerHTML='';
  const views={dash:vDash,stores:vStores,people:vPeople,acts:vActions,ai:vAI,access:vAccess,rpts:vReports};
  const vfn=views[TAB];
  if(vfn) m.appendChild(vfn());
}

function rActs(){
  const g=document.getElementById('ag');if(!g)return;g.innerHTML='';
  const P={critical:{c:'var(--red)',bg:'rgba(217,48,37,.04)',t:'tr',l:'⚡ Critical'},high:{c:'var(--amb)',bg:'rgba(192,120,24,.04)',t:'ta',l:'↑ High'},medium:{c:'var(--blue)',bg:'rgba(26,86,219,.04)',t:'tb2',l:'→ Medium'},low:{c:'var(--t4)',bg:'var(--bg2)',t:'tx',l:'↓ Low'}};
  let acts=D.actions||[];
  if(UI.af&&UI.af!=='all') acts=acts.filter(a=>(a.status||'open')===UI.af);
  acts.sort((a,b)=>{const o={critical:0,high:1,medium:2,low:3};return(o[a.priority]||2)-(o[b.priority]||2);});
  if(!acts.length){g.innerHTML=`<div class="empty"><div class="empty-ic">✅</div><h4>All clear!</h4><p>No actions here</p></div>`;return;}
  acts.forEach((a,i)=>{
    const p=P[a.priority||'medium']||P.medium;
    const r=div({cls:'card',sty:{borderLeft:`3px solid ${p.c}`,marginBottom:'9px',background:p.bg,'animation-delay':`${i*30}ms`,'animation':'up .3s var(--ease) both'}});
    r.innerHTML=`
      <div style="display:flex;align-items:flex-start;gap:9px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:700">${a.store_code||'?'} — ${a.gap||'Training required'}</span>
            <span class="tag ${p.t}">${p.l}</span>
            <span class="tag tx">${a.status||'open'}</span>
          </div>
          <div style="font-size:10px;color:var(--t3);margin-bottom:4px">${a.person||'Store team'} · ${a.role||'SA'} · Due: ${fmt(a.due_date)}</div>
          ${a.notes?`<div style="font-size:11px;color:var(--t2);background:var(--card);padding:7px 9px;border-radius:6px;border:1px solid var(--border)">${a.notes}</div>`:''}
        </div>
        ${(a.status||'open')!=='completed'?`<div style="display:flex;gap:5px;flex-shrink:0">
          <button class="btn bg2 bsm" onclick="upAct('${a.action_id}','scheduled')">Schedule</button>
          <button class="btn bp bsm" onclick="upAct('${a.action_id}','completed')">✓ Done</button>
        </div>`:'<span class="tag tg">✓ Completed</span>'}
      </div>`;
    g.appendChild(r);
  });
}

async function upAct(id,status){
  const res=await call('updateAction',{action_id:id,status});
  if(res){const a=D.actions?.find(x=>x.action_id===id);if(a)a.status=status;rActs();toast(`Action marked as ${status}`,'ok');}
  else toast('Failed — check connection','err');
}

function mAction(){
  const mo=div({cls:'mo'});mo.onclick=e=>{if(e.target===mo)mo.remove();};

    <div class="mf"><label>Training gap *</label><input class="inp" id="ac-g" placeholder="e.g. Discovery Gap"></div>
    <div class="mf"><label>Priority</label><select class="inp" id="ac-p"><option value="critical">⚡ Critical</option><option value="high" selected>↑ High</option><option value="medium">→ Medium</option><option value="low">↓ Low</option></select></div>

    <div class="ma">

async function svAct(){
  const store=document.getElementById('ac-s')?.value.trim().toUpperCase();
  const gap=document.getElementById('ac-g')?.value.trim();
  if(!store||!gap){toast('Store code and gap required','err');return;}
  const sb=document.getElementById('ac-sv');sb.textContent='Saving...';sb.style.opacity='.7';
  const res=await call('createAction',{store_code:store,gap,priority:document.getElementById('ac-p')?.value,due_date:document.getElementById('ac-d')?.value,notes:document.getElementById('ac-n')?.value,source:'Manual'});
  if(res){if(!D.actions)D.actions=[];D.actions.push(res);document.querySelector('.mo')?.remove();render();toast('Action created ✓','ok');}
  else toast('Failed — check API connection','err');
}

function vAI(){
  const w=div({cls:'au'});
  w.innerHTML=`<div class="sh2"><div class="sh2-l"><h2>✦ Baseer AI</h2><p>eyewa's training content engine · powered by Claude</p></div></div>`;

  const chat=div({cls:'ai-wrap',id:'ai-chat'});
  if(!UI.ai.length){
    chat.innerHTML=`<div class="ai-msg ai"><div class="ai-author">Baseer</div>Marhaba! I'm Baseer — eyewa's AI training agent.<br><br>I generate professional training content specific to eyewa: quizzes, WhatsApp announcements, objection handling scripts, role-play scenarios, session plans, onboarding checklists — all using real eyewa product names and KPIs.<br><br>Try a quick prompt below or type your request.</div>`;
  } else {
    UI.ai.forEach(m=>{const msg=div({cls:`ai-msg ${m.r}`});msg.innerHTML=m.r==='ai'?`<div class="ai-author">Baseer</div><div style="white-space:pre-wrap">${m.c}</div>`:`<div style="white-space:pre-wrap">${m.c}</div>`;chat.appendChild(msg);});
    if(UI.ail){const d=div({cls:'ai-msg ai'});d.innerHTML=`<div class="ai-author">Baseer</div><div class="ai-dots"><span></span><span></span><span></span></div>`;chat.appendChild(d);}
  }
  w.appendChild(chat);

  const qp=div({cls:'qp'});
  ['10-question CLARIVO Progressive Lens quiz with answer key',
   'WhatsApp announcement for Insurance Protocol session — bilingual EN/AR',
   'Objection handling script for "it\'s too expensive"',
   'Role-play: needs discovery in an eyewa store',
   '60-min instore coaching session plan — Needs Discovery',
   'Day 1 onboarding checklist for new Sales Advisor',
   'Post-session report template',
   'Golden selling sentences for CLARIVO lenses',
  ].forEach(p=>{const b=mk('button',{cls:'qpb'});b.textContent=p;b.onclick=()=>sendAI(p);qp.appendChild(b);});
  w.appendChild(qp);

  const row=div({sty:{display:'flex',gap:'7px'}});
  const inp=mk('input',{cls:'inp',id:'ai-inp',placeholder:'Ask Baseer to generate any training content...',sty:{flex:'1'}});
  inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}};
  row.appendChild(inp);row.appendChild(btn('Send ↵','bp bsm',()=>sendAI()));
  w.appendChild(row);
  setTimeout(()=>{const c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);
  return w;
}

async function sendAI(prompt){
  const inp=document.getElementById('ai-inp');
  const msg=prompt||inp?.value?.trim();
  if(!msg)return;if(inp)inp.value='';
  UI.ai.push({r:'user',c:msg});UI.ail=true;render();
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1500,
      system:`You are Baseer — eyewa's AI training agent embedded in the ECIP training OS for Saudi Arabia. Generate professional, ready-to-use training content for eyewa optical retail store teams. Products: CLARIVO Progressive Lens, CLARIVO Single Vision, OPTICORE solutions, prescription frames, sunglasses, contact lenses. Roles: Sales Advisor (SA), Senior SA, SIC, ASM, Store Manager, Optician, Optometrist. KPIs: Conversion Rate (target 55%), Insurance Attachment Rate (target 50%), AOV, UPT, Lens Upgrade Rate. Always specific to eyewa — never generic. English by default, Arabic if asked.`,
      messages:UI.ai.slice(-12).filter(m=>m.r==='user'||m.r==='ai').map(m=>({role:m.r==='ai'?'assistant':'user',content:m.c})),
    })});
    const data=await res.json();
    UI.ai.push({r:'ai',c:data.content?.[0]?.text||'Error — please try again.'});
  } catch(e){UI.ai.push({r:'ai',c:'Connection error. Ensure the Anthropic API is available.'});}
  UI.ail=false;render();
}

async function svUser(){
  const name=document.getElementById('nu-n')?.value.trim();
  const email=document.getElementById('nu-e')?.value.trim().toLowerCase();
  const pass=document.getElementById('nu-p')?.value.trim();
  const role=document.getElementById('nu-r')?.value;
  const app=document.getElementById('nu-a')?.value;
  const stores=document.getElementById('nu-s')?.value.trim()||'all';
  if(!name||!email||!pass){toast('Name, email and password required','err');return;}
  if(pass.length<6){toast('Password must be at least 6 characters','err');return;}
  const sb=document.getElementById('nu-sv');
  sb.textContent='Saving to Google Sheets...';sb.style.opacity='.7';sb.style.pointerEvents='none';
  const res=await call('addUser',{name,email,password:pass,role,app,stores,regions:'all',created_by:CU?.email});
  if(res){
    if(!D.users)D.users=[];
    D.users.push({user_id:res.user_id||('U'+Date.now()),name,email,role,app,stores,active:'true'});
    document.querySelector('.mo')?.remove();render();
    toast(`${name} added — visible to everyone now ✓`,'ok',4500);
  } else {
    sb.textContent='Add user →';sb.style.opacity='';sb.style.pointerEvents='';
    toast('API unavailable — check Google Sheets connection','err',5000);
  }
}

async function rmUser(id,name,card){
  if(!confirm(`Remove ${name} from ECIP?`))return;
  const res=await call('updateUser',{user_id:id,active:'false'});
  if(res||!id.startsWith('API')){
    card.style.cssText='opacity:0;transform:translateX(-8px);transition:all .3s;pointer-events:none';
    setTimeout(()=>{card.remove();D.users=D.users?.filter(u=>u.user_id!==id);},320);
    toast(`${name} removed`,'inf');
  } else toast('Failed to remove','err');
}

function vReports(){
  const w=div({cls:'au'});
  const sess=D.sessions||[];const reqs=D.requests||[];
  w.innerHTML=`<div class="sh2"><div class="sh2-l"><h2>Reports & Requests</h2><p>${sess.length} sessions · ${reqs.length} training requests</p></div></div>`;

  const h1=div({sty:{fontSize:'13px',fontWeight:'700',marginBottom:'9px'}});h1.textContent='📅 Training sessions';w.appendChild(h1);
  const stc={planned:'tb2',open:'tg',completed:'tg',cancelled:'tr',instore:'tg',classroom:'tb2',virtual:'tp'};
  if(!sess.length){w.appendChild(div({cls:'card',sty:{textAlign:'center',padding:'20px',color:'var(--t3)',fontSize:'12px'},'html':'No sessions scheduled yet'}));}
  else {
    sess.slice(0,12).forEach((s,i)=>{
      const r=div({cls:'card',sty:{marginBottom:'7px','animation-delay':`${i*22}ms`,'animation':'up .3s var(--ease) both'}});
      r.innerHTML=`<div style="display:flex;align-items:center;gap:9px">
        <div style="flex:1"><div style="font-size:12px;font-weight:700;margin-bottom:2px">${s.course}</div><div style="font-size:10px;color:var(--t3)">${s.store_code||'?'} · ${s.trainer_id||'?'} · ${fmt(s.date)}</div></div>
        <div style="display:flex;gap:4px"><span class="tag ${stc[s.type||'']||'tx'}">${s.type||'instore'}</span><span class="tag ${stc[s.status||'planned']||'tx'}">${s.status||'planned'}</span></div>
        ${s.status!=='completed'?`<button class="btn bp bsm" onclick="dnSess('${s.session_id}')">Mark done</button>`:''}
      </div>`;
      w.appendChild(r);
    });
  }

  w.appendChild(div({cls:'div'}));
  const h2=div({sty:{fontSize:'13px',fontWeight:'700',marginBottom:'9px'}});h2.textContent='📩 Training requests from stores';w.appendChild(h2);
  const rsc={pending:'ta',in_progress:'tb2',completed:'tg'};
  if(!reqs.length){w.appendChild(div({cls:'card',sty:{textAlign:'center',padding:'20px',color:'var(--t3)',fontSize:'12px'},'html':'No pending requests'}));}
  else {
    reqs.forEach((r,i)=>{
      const row=div({cls:'card',sty:{marginBottom:'7px','animation-delay':`${i*22}ms`,'animation':'up .3s var(--ease) both'}});
      row.innerHTML=`<div style="display:flex;align-items:center;gap:9px">
        <div style="flex:1"><div style="font-size:12px;font-weight:700;margin-bottom:2px">${r.course}</div><div style="font-size:10px;color:var(--t3)">${r.store_code} · ${fmt(r.preferred_date||r.created_at)} · ${r.staff_count||'—'} staff</div>
        ${r.notes?`<div style="font-size:11px;color:var(--t2);margin-top:3px">${r.notes}</div>`:''}</div>
        <span class="tag ${rsc[r.status]||'tx'}">${(r.status||'pending').replace('_',' ')}</span>
        ${r.status==='pending'?`<button class="btn bp bsm" onclick="apReq('${r.request_id}')">Approve</button>`:''}
      </div>`;
      w.appendChild(row);
    });
  }
  return w;
}

async function dnSess(id){
  const res=await call('updateSession',{session_id:id,status:'completed',completed_at:new Date().toISOString()});
  if(res){const s=D.sessions?.find(x=>x.session_id===id);if(s)s.status='completed';render();toast('Session completed ✓','ok');}
  else toast('Failed','err');
}
async function apReq(id){
  const res=await call('updateRequest',{request_id:id,status:'in_progress',responded_by:CU?.name});
  if(res){const r=D.requests?.find(x=>x.request_id===id);if(r)r.status='in_progress';render();toast('Request approved ✓','ok');}
  else toast('Failed','err');
}
