function pctColor(p){return p>=80?C.ew:p>=50?C.amb:C.red}
function typeColor(t){return t==="classroom"?C.ew:t==="virtual"?C.blue:t==="instore"?C.purp:C.t3}
function typeIcon(t){return t==="classroom"?"🏫":t==="virtual"?"💻":"🏪"}
function typeLabel(t){return t==="classroom"?"Classroom":t==="virtual"?"Virtual":"In-store"}
function ttColor(t){return t==="Mandatory"?C.red:t==="Targeted"?C.amb:C.blue}
function ttBg(t){return t==="Mandatory"?C.redl:t==="Targeted"?C.ambl:C.bluel}
function initials(name){return name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}
function isBlocked(dateStr){
  if(!dateStr)return null;
  for(const b of BLOCKED_DATES){if(dateStr>=b.s&&dateStr<=b.e)return b;}
  return null;
}

function h(tag, attrs={}, ...children){
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") el.className=v;
    else if(k==="html") el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}
function div(attrs,...children){return h("div",attrs,...children)}
function span(attrs,...children){return h("span",attrs,...children)}
function btn(text,cls,onclick,extra={}){
  const b=h("button",{class:"btn "+cls,onClick:onclick,...extra});
  b.innerHTML=text;return b;
}
function tag(text,color="gray"){return span({class:`tag tag-${color}`},text)}
function bar(val,max=100,color,height=5){
  return div({class:"bar-track",style:{height:height+"px"}},
    div({class:"bar-fill",style:{width:`${Math.min(100,(val/max)*100)}%`,background:color||C.ew,height:"100%"}})
  );
}
function statCard(label,value,sub,color){
  return div({class:"stat-card"},
    div({class:"stat-label"},label),
    div({class:"stat-value",style:{color:color||C.t1}},value),
    sub?div({class:"stat-sub"},sub):null
  );
}
function sh(title,subtitle,actionEl=null){
  return div({class:"sh"},
    div({},
      div({class:"sh-title"},title),
      subtitle?div({class:"sh-sub"},subtitle):null
    ),
    actionEl
  );
}
function card(children,style={}){
  const el=div({class:"card"});
  Object.assign(el.style,style);
  if(Array.isArray(children))children.flat(Infinity).filter(Boolean).forEach(c=>el.appendChild(typeof c==="string"?document.createTextNode(c):c));
  else if(children)el.appendChild(typeof children==="string"?document.createTextNode(children):children);
  return el;
}
function infoRow(label,value){
  return div({style:{background:"#F8F8F6",borderRadius:"8px",padding:"8px 11px"}},
    div({class:"section-header",style:{marginBottom:"2px"}},label),
    div({style:{fontSize:"11px",fontWeight:"600",color:C.t1}},value||"—")
  );
}
function pillBtn(text, active, onclick, activeColor=null){
  const el=h("button",{class:`pill-btn${active?" active":""}`,onClick:onclick});
  if(active&&activeColor){el.style.background=activeColor+"18";el.style.borderColor=activeColor;el.style.color=activeColor;}
  el.textContent=text;
  return el;
}

    "eyewa ",span({style:{fontSize:"9px",fontWeight:"500",color:C.t3,marginLeft:"1px"}},"ECIP")

  // Role switcher
  const rSwitch=div({style:{display:"flex",gap:"3px",background:"#F0F0EE",borderRadius:"8px",padding:"3px",flexShrink:"0",marginRight:"12px"}});
  VIEWS.forEach((v,i)=>{
    const roleMeta=ROLES_META[v.roleKey];

      class:"btn",
      onClick:()=>{STATE.viewIdx=i;STATE.tab=VIEWS[i].tabs[0].id;STATE.showCreateSession=false;STATE.showAddCourse=false;render();},
      style:{padding:"3px 10px",borderRadius:"6px",fontSize:"10px",fontWeight:"700",border:"none",

    rSwitch.appendChild(b);
  });
  bar_el.appendChild(rSwitch);

  // Tab nav
  const tabNav=div({style:{display:"flex",height:"50px",overflowX:"auto",flex:"1"}});
  view.tabs.forEach(t=>{
    const isActive=STATE.tab===t.id&&!STATE.showCreateSession&&!STATE.showAddCourse;

      class:`nav-tab${isActive?" active":""}`,

      tabEl.appendChild(badge);
    }
    tabNav.appendChild(tabEl);
  });
  bar_el.appendChild(tabNav);

  // User pill
  const userArea=div({style:{marginLeft:"auto",display:"flex",alignItems:"center",gap:"8px",flexShrink:"0",paddingLeft:"12px"}});
  userArea.appendChild(div({style:{background:rm.bg,border:`1px solid ${rm.color}40`,borderRadius:"20px",padding:"3px 10px",fontSize:"10px",color:rm.color,fontWeight:"700"}},view.pill));

  bar_el.appendChild(userArea);

  return bar_el;
}

  ["all",...regions].forEach(r=>{
    filters.appendChild(pillBtn(r==="all"?"All":r,STATE.convFilterRegion===r,()=>{STATE.convFilterRegion=r;render();}));
  });
  filters.appendChild(div({style:{width:"1px",height:"20px",background:C.b2}}));
  filters.appendChild(span({style:{fontSize:"10px",fontWeight:"700",color:C.t3}},"RISK"));
  [{k:"all",l:"All"},{k:"high_risk",l:"🔴 High Risk"},{k:"medium",l:"🟡 Medium"},{k:"stable",l:"🟢 Stable"},{k:"top_performer",l:"⭐ Top Performer"}].forEach(({k,l})=>{
    const rm=RISK_META[k];
    filters.appendChild(pillBtn(l,STATE.convFilterRisk===k,()=>{STATE.convFilterRisk=k;render();},rm?.color));

  wrap.appendChild(filters);

  // Store cards
  filtered.forEach(store=>{
    const rm=RISK_META[store.riskLevel];
    const gap=store.conv.target-store.conv.current;
    const trend=store.conv.current-store.conv.prevWeek;
    const trainer=STATE.trainers.find(t=>t.id===store.trainer);
    const isExpanded=STATE.convExpandedStore===store.id;

    const storeCard=div({class:"store-card",style:{background:"#fff",border:`1px solid ${store.riskLevel==="high_risk"?C.redb:C.b1}`,borderRadius:"12px",overflow:"hidden",borderLeft:`4px solid ${rm.color}`,marginBottom:"10px",transition:"box-shadow .15s"}});

    // Main row
    const mainRow=div({style:{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:"14px"},onClick:()=>{STATE.convExpandedStore=isExpanded?null:store.id;render();}});

    // Dial
    mainRow.appendChild(div({style:{flexShrink:"0",textAlign:"center",background:rm.bg,borderRadius:"10px",padding:"10px 14px",minWidth:"72px"}},
      div({style:{fontSize:"26px",fontWeight:"900",color:rm.color,lineHeight:"1",fontFamily:"monospace"}},store.conv.current+"%"),
      div({style:{fontSize:"8px",fontWeight:"700",color:rm.color,textTransform:"uppercase",marginTop:"2px"}},"conv."),
      div({style:{fontSize:"9px",color:rm.color,marginTop:"2px",fontWeight:"600"}},(trend>=0?"▲":"▼")+Math.abs(trend)+"% WoW")
    ));

    // Info
    const info=div({style:{flex:"1",minWidth:"0"}});
    const nameRow=div({style:{display:"flex",alignItems:"center",gap:"7px",marginBottom:"4px",flexWrap:"wrap"}});
    nameRow.appendChild(span({style:{fontSize:"13px",fontWeight:"800",color:C.t1}},store.name));
    nameRow.appendChild(span({class:`tag`,style:{background:rm.bg,color:rm.color,border:`1px solid ${rm.border}`,fontSize:"9px"}},`${rm.dot} ${rm.label}`));
    nameRow.appendChild(span({style:{fontSize:"10px",color:C.t3}},`${store.city} · ${store.region}`));
    info.appendChild(nameRow);

    // Target bar
    const barWrap=div({style:{marginBottom:"8px"}});
    const barLbl=div({style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}});
    barLbl.appendChild(span({style:{fontSize:"9px",color:C.t3}},`Conversion vs target (${store.conv.target}%)`));
    barLbl.appendChild(span({style:{fontSize:"9px",fontWeight:"700",color:gap>0?C.red:C.ew}},gap>0?`${gap}pts below target`:"Above target"));
    barWrap.appendChild(barLbl);
    const barTrack=div({style:{height:"6px",background:"#E8E8E6",borderRadius:"6px",overflow:"hidden",position:"relative"}});
    barTrack.appendChild(div({style:{height:"100%",width:`${(store.conv.current/70)*100}%`,background:rm.color,borderRadius:"6px"}}));
    barTrack.appendChild(div({style:{position:"absolute",top:"0",left:`${(store.conv.target/70)*100}%`,width:"2px",height:"100%",background:C.t2}}));
    barWrap.appendChild(barTrack);
    info.appendChild(barWrap);

    // Issue tags
    const issueTags=div({style:{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"6px"}});
    store.issues.forEach(issue=>{
      const im=ISSUE_META[issue];
      issueTags.appendChild(span({style:{fontSize:"9px",fontWeight:"700",padding:"2px 8px",borderRadius:"20px",background:im?.bg,color:im?.color}},`${im?.icon} ${im?.label}`));
    });
    if(!store.issues.length)issueTags.appendChild(span({style:{fontSize:"9px",color:C.t3}},"No issues detected"));
    info.appendChild(issueTags);

    // Meta
    const meta=div({style:{display:"flex",gap:"12px",fontSize:"9px",color:C.t3,flexWrap:"wrap"}});
    [`👥 ${store.teamSize} staff`,`✅ ${store.mandatoryPct}% mandatory`,store.newJoiners>0?`🆕 ${store.newJoiners} new joiners`:null,`📲 ${store.llActive}/${store.teamSize} LearnLab`,`🧑‍🏫 ${trainer?.name||"Unassigned"}`].filter(Boolean).forEach(m=>{
      const mEl=span({},m);
      if(m.includes("new joiners"))mEl.style.cssText="color:"+C.purp+";font-weight:700";
      meta.appendChild(mEl);
    });
    info.appendChild(meta);
    mainRow.appendChild(info);

    // Actions
    const actWrap=div({style:{flexShrink:"0",display:"flex",flexDirection:"column",gap:"5px"},onClick:e=>e.stopPropagation()});
    if(store.riskLevel==="high_risk"||store.riskLevel==="medium"){
      actWrap.appendChild(btn("→ Create actions","btn-sm btn-primary",()=>{
        // derive and add actions
        store.issues.forEach((issue,i)=>{
          const im=ISSUE_META[issue];
          const course=STATE.courses.find(c=>c.id===im?.course);
          const tr=STATE.trainers.find(t=>t.id===store.trainer);
          const gap2=store.conv.target-store.conv.current;
          const newId=`CA${store.id}_${i}_${Date.now()}`;
          if(!STATE.actions.find(a=>a.store===store.name&&a.issueType===issue)){
            STATE.actions.unshift({id:newId,source:"KPI Trigger",sourceIcon:"📉",store:store.name,region:store.region,person:"Store team",role:"SA",issueType:issue,conversionCurrent:store.conv.current,conversionTarget:store.conv.target,gap:im?.label||issue,course:course?.name||"—",cid:im?.course,priority:gap2>15?"critical":"high",due:"2026-04-25",status:"open",owner:tr?.name||"Unassigned",trainerId:store.trainer,kpi:"Conversion Rate",severity:gap2>15?3:2,notes:im?.desc||""});
          }
        });
        STATE.tab="actions";render();
      }));
    }
    actWrap.appendChild(btn(isExpanded?"Collapse":"Details","btn-sm btn-ghost",()=>{STATE.convExpandedStore=isExpanded?null:store.id;render();}));
    mainRow.appendChild(actWrap);
    storeCard.appendChild(mainRow);

    // Expanded detail
    if(isExpanded){
      const detail=div({style:{borderTop:`1px solid ${C.b1}`,padding:"14px 16px",background:"#FAFAF8"}});
      const statsRow=div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}});
      [[store.conv.current+"%","This week",rm.color],[store.conv.prevWeek+"%","Last week",C.t2],[store.conv.prevMonth+"%","Last month avg",C.t2]].forEach(([v,l,col])=>{
        statsRow.appendChild(div({style:{background:"#fff",borderRadius:"9px",padding:"9px 12px",textAlign:"center",border:`1px solid ${C.b1}`}},
          div({style:{fontSize:"18px",fontWeight:"800",color:col,fontFamily:"monospace"}},v),
          div({style:{fontSize:"9px",color:C.t3,marginTop:"2px"}},l)
        ));
      });
      detail.appendChild(statsRow);

      if(store.issues.length>0){
        detail.appendChild(div({class:"section-header"},"Why conversion is low"));
        store.issues.forEach(issue=>{
          const im=ISSUE_META[issue];
          const course=STATE.courses.find(c=>c.id===im?.course);
          const issueCard=div({style:{background:"#fff",border:`1px solid ${im?.color}30`,borderRadius:"9px",padding:"10px 12px",marginBottom:"6px",borderLeft:`3px solid ${im?.color}`}});
          issueCard.appendChild(div({style:{fontSize:"11px",fontWeight:"700",color:im?.color,marginBottom:"2px"}},`${im?.icon} ${im?.label}`));
          issueCard.appendChild(div({style:{fontSize:"10px",color:C.t2,marginTop:"2px"}},im?.desc));
          if(course)issueCard.appendChild(div({style:{fontSize:"10px",color:C.t3,marginTop:"3px"}},`→ Recommended: `,span({style:{fontWeight:"700",color:C.ewd}},course.name)));
          detail.appendChild(issueCard);
        });
      }

      const visitRow=div({style:{display:"flex",gap:"10px",fontSize:"10px",marginTop:"8px"}});
      [[store.lastVisit||"Not recorded","Last trainer visit",false],[store.nextVisit||"⚠ Not scheduled","Next planned visit",!store.nextVisit]].forEach(([v,l,isAlert])=>{
        visitRow.appendChild(div({style:{flex:"1",background:"#fff",borderRadius:"8px",padding:"8px 11px",border:`1px solid ${isAlert?C.redb:store.nextVisit&&l.includes("Next")?C.ewm:C.b1}`}},
          div({class:"section-header"},l),
          div({style:{fontWeight:"600",color:isAlert?C.red:l.includes("Next")&&store.nextVisit?C.ewd:C.t1}},v)
        ));
      });
      detail.appendChild(visitRow);
      storeCard.appendChild(detail);
    }
    wrap.appendChild(storeCard);
  });
  return wrap;
}

// ═══════════════════════════════════════════════════════════════════
// TRAINING ACTIONS
// ═══════════════════════════════════════════════════════════════════
function renderActions(){
  const wrap=div({});
  const {actionsFilterStatus:fs,actionsFilterPriority:fp,actionsFilterStore:fstore,actionsFilterSource:fsrc,actionsSortBy:sortBy}=STATE;

  const sources=[...new Set(STATE.actions.map(a=>a.source))];
  const stores=[...new Set(STATE.actions.map(a=>a.store))];
  const open=STATE.actions.filter(a=>a.status==="open").length;
  const critical=STATE.actions.filter(a=>a.priority==="critical"&&a.status!=="completed"&&a.status!=="cancelled").length;
  const scheduled=STATE.actions.filter(a=>a.status==="scheduled").length;
  const completed=STATE.actions.filter(a=>a.status==="completed").length;
  const overdue=STATE.actions.filter(a=>a.status!=="completed"&&a.status!=="cancelled"&&a.due<"2026-04-18").length;

  // Stats
  const statsRow=div({style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"10px",marginBottom:"14px"}});
  [[open,"Open actions","need scheduling",open>0?C.red:C.ew],[critical,"Critical","unresolved",critical>0?C.red:C.ew],[scheduled,"Scheduled","sessions linked",C.blue],[completed,"Completed","this month",C.ew],[overdue,"Overdue","past due date",overdue>0?C.red:C.ew]].forEach(([v,l,s,col])=>statsRow.appendChild(statCard(l,String(v),s,col)));
  wrap.appendChild(statsRow);

  // Critical banner
  if(critical>0){
    const banner=div({style:{background:C.redl,border:`1px solid ${C.redb}`,borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}});
    banner.appendChild(span({style:{fontSize:"18px"}},"🔴"));
    banner.appendChild(div({style:{flex:"1"}},
      div({style:{fontSize:"12px",fontWeight:"700",color:C.red}},`${critical} critical action${critical>1?"s":""} require immediate attention`),
      div({style:{fontSize:"10px",color:C.red,opacity:".8",marginTop:"2px"}},STATE.actions.filter(a=>a.priority==="critical"&&a.status==="open").map(a=>`${a.person} · ${a.gap}`).join(" · "))
    ));
    banner.appendChild(btn("View critical →","btn-sm btn-danger",()=>{STATE.actionsFilterPriority="critical";STATE.actionsFilterStatus="open";render();}));
    wrap.appendChild(banner);
  }

  // Filters bar
  const filtersCard=card([],{marginBottom:"12px",padding:"12px 14px"});
  const filtersRow=div({style:{display:"flex",gap:"7px",alignItems:"center",flexWrap:"wrap"}});
  filtersRow.appendChild(span({style:{fontSize:"10px",fontWeight:"700",color:C.t3,marginRight:"2px"}},"STATUS"));
  [{v:"open",l:"🔴 Open"},{v:"assigned",l:"🟠 Assigned"},{v:"scheduled",l:"🔵 Scheduled"},{v:"completed",l:"✅ Completed"},{v:"all",l:"All"}].forEach(({v,l})=>{
    filtersRow.appendChild(pillBtn(l,fs===v,()=>{STATE.actionsFilterStatus=v;render();}));
  });
  filtersRow.appendChild(div({style:{width:"1px",height:"20px",background:C.b2,margin:"0 4px"}}));
  filtersRow.appendChild(span({style:{fontSize:"10px",fontWeight:"700",color:C.t3,marginRight:"2px"}},"PRIORITY"));
  ["all","critical","high","medium","low"].forEach(p=>{
    const pm=PRIORITY_META[p];
    filtersRow.appendChild(pillBtn(p==="all"?"All":(pm.dot+" "+pm.label),fp===p,()=>{STATE.actionsFilterPriority=p;render();},pm?.color));
  });
  // Selects on right
  const selRight=div({style:{marginLeft:"auto",display:"flex",gap:"7px",alignItems:"center"}});
  const selStyle="background:#fff;border:1px solid "+C.b1+";border-radius:7px;padding:5px 28px 5px 8px;font-size:11px;outline:none";
  const storeSelect=h("select",{style:{cssText:selStyle},onChange:e=>{STATE.actionsFilterStore=e.target.value;render();}});
  [["all","All stores"],...stores.map(s=>[s,s])].forEach(([v,l])=>{const o=h("option",{value:v},l);if(v===fstore)o.selected=true;storeSelect.appendChild(o);});
  const srcSelect=h("select",{style:{cssText:selStyle},onChange:e=>{STATE.actionsFilterSource=e.target.value;render();}});
  [["all","All sources"],...sources.map(s=>[s,s])].forEach(([v,l])=>{const o=h("option",{value:v},l);if(v===fsrc)o.selected=true;srcSelect.appendChild(o);});
  const sortSelect=h("select",{style:{cssText:selStyle},onChange:e=>{STATE.actionsSortBy=e.target.value;render();}});
  [["priority","Sort: Priority"],["due","Sort: Due date"],["store","Sort: Store"]].forEach(([v,l])=>{const o=h("option",{value:v},l);if(v===sortBy)o.selected=true;sortSelect.appendChild(o);});
  selRight.appendChild(storeSelect);selRight.appendChild(srcSelect);selRight.appendChild(sortSelect);
  filtersRow.appendChild(selRight);
  filtersCard.appendChild(filtersRow);
  wrap.appendChild(filtersCard);

  // Action list
  let filtered=STATE.actions
    .filter(a=>fs==="all"||a.status===fs)
    .filter(a=>fp==="all"||a.priority===fp)
    .filter(a=>fstore==="all"||a.store===fstore)
    .filter(a=>fsrc==="all"||a.source===fsrc)
    .sort((a,b)=>{
      if(sortBy==="priority")return (PRIORITY_META[a.priority]?.order??9)-(PRIORITY_META[b.priority]?.order??9);
      if(sortBy==="due")return a.due.localeCompare(b.due);
      return a.store.localeCompare(b.store);
    });

  if(!filtered.length){
    wrap.appendChild(card(div({style:{textAlign:"center",color:C.t3,padding:"36px",fontSize:"12px"}},"No actions match current filters")));
    return wrap;
  }

  const listWrap=div({style:{display:"grid",gap:"8px"}});
  filtered.forEach(action=>{
    const pm=PRIORITY_META[action.priority];
    const sm2=STATUS_META[action.status];
    const isOverdue=action.status!=="completed"&&action.status!=="cancelled"&&action.due<"2026-04-18";
    const row=div({class:"action-row",style:{background:"#fff",border:`1px solid ${action.priority==="critical"&&action.status==="open"?C.redb:C.b1}`,borderRadius:"12px",padding:"13px 15px",cursor:"pointer",borderLeft:`4px solid ${pm.color}`,transition:"box-shadow .15s"},onClick:()=>{STATE.selAction=action;render();}});
    const inner=div({style:{display:"flex",alignItems:"flex-start",gap:"12px"}});

    // Icon + priority label
    inner.appendChild(div({style:{flexShrink:"0",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",paddingTop:"2px"}},
      span({style:{fontSize:"16px"}},action.sourceIcon),
      span({style:{fontSize:"8px",fontWeight:"700",color:pm.color,textTransform:"uppercase",writingMode:"vertical-lr",transform:"rotate(180deg)",lineHeight:"1"}},pm.label)
    ));

    // Content
    const content=div({style:{flex:"1",minWidth:"0"}});
    const titleRow=div({style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px",marginBottom:"5px"}});
    const titleLeft=div({});
    const titleMain=div({style:{fontSize:"12px",fontWeight:"800",color:C.t1,marginBottom:"2px"}},action.gap);
    if(isOverdue)titleMain.appendChild(span({style:{marginLeft:"7px",fontSize:"9px",fontWeight:"700",color:C.red,background:C.redl,padding:"1px 6px",borderRadius:"10px"}},"OVERDUE"));
    titleLeft.appendChild(titleMain);
    titleLeft.appendChild(div({style:{fontSize:"10px",color:C.t3}},`${action.store} · ${action.person} · ${action.role} · Due ${action.due}`));
    titleRow.appendChild(titleLeft);
    const badges=div({style:{display:"flex",gap:"5px",flexWrap:"wrap",flexShrink:"0"}});
    badges.appendChild(span({class:"tag",style:{background:pm.bg,color:pm.color}},`${pm.dot} ${pm.label}`));
    badges.appendChild(span({class:"tag",style:{background:sm2.bg,color:sm2.color}},sm2.label));
    titleRow.appendChild(badges);
    content.appendChild(titleRow);

    // Course + KPI
    const courseRow=div({style:{display:"flex",gap:"10px",alignItems:"center",marginBottom:"6px"}});
    courseRow.appendChild(div({style:{fontSize:"10px",color:C.t2}},`📚 ${action.course}`));
    courseRow.appendChild(span({class:"tag tag-gray",style:{fontSize:"9px"}},`📊 ${action.kpi}`));
    content.appendChild(courseRow);

    // Notes
    if(action.notes)content.appendChild(div({style:{fontSize:"10px",color:C.t3,background:"#F8F8F6",borderRadius:"7px",padding:"5px 9px",marginBottom:"6px"}},action.notes));

    // Quick actions
    const qActions=div({style:{display:"flex",gap:"6px"},onClick:e=>e.stopPropagation()});
    if(action.status==="open"){
      qActions.appendChild(btn("+ Create session","btn-sm btn-primary",()=>{STATE.showCreateSession=true;STATE.prefillStore={name:action.store};render();}));
      qActions.appendChild(btn("Assign","btn-sm btn-secondary",()=>{action.status="assigned";render();}));
    }
    if(action.status==="assigned")qActions.appendChild(btn("Mark Scheduled","btn-sm btn-secondary",()=>{action.status="scheduled";render();}));
    if(action.status==="scheduled")qActions.appendChild(btn("Mark Completed","btn-sm btn-primary",()=>{action.status="completed";render();}));
    content.appendChild(qActions);
    inner.appendChild(content);
    row.appendChild(inner);
    listWrap.appendChild(row);
  });
  wrap.appendChild(listWrap);
  return wrap;
}

// SESSIONS MANAGER
// ═══════════════════════════════════════════════════════════════════
function renderSessions(){
  const wrap=div({});
  const hdr=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}});
  hdr.appendChild(div({},div({style:{fontSize:"15px",fontWeight:"800"}},"My Sessions"),div({style:{fontSize:"10px",color:C.t3,marginTop:"1px"}},STATE.sessions.length+" total · "+STATE.sessions.filter(s=>s.status==="open"||s.status==="planned").length+" upcoming")));
  hdr.appendChild(btn("+ New session","btn-primary",()=>{STATE.showCreateSession=true;STATE.prefillStore=null;render();}));
  wrap.appendChild(hdr);

  // Stats
  const statsRow=div({style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"14px"}});

  wrap.appendChild(statsRow);

  // Session list
  [...STATE.sessions].sort((a,b)=>b.date.localeCompare(a.date)).forEach(s=>{
    const sCard=div({class:"card",style:{marginBottom:"8px",borderLeft:`4px solid ${typeColor(s.type)}`}});
    const row=div({style:{display:"flex",alignItems:"flex-start",gap:"12px"}});
    row.appendChild(div({style:{flexShrink:"0",background:typeColor(s.type)+"18",borderRadius:"9px",padding:"8px 10px",textAlign:"center",minWidth:"50px"}},
      span({style:{fontSize:"20px"}},typeIcon(s.type)),
      div({style:{fontSize:"8px",fontWeight:"700",color:typeColor(s.type),marginTop:"2px"}},typeLabel(s.type))
    ));
    const info=div({style:{flex:"1",minWidth:"0"}});
    const r1=div({style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"4px"}});
    r1.appendChild(div({style:{fontSize:"12px",fontWeight:"800",color:C.t1}},s.course));
    const badges=div({style:{display:"flex",gap:"5px",flexShrink:"0"}});
    badges.appendChild(span({class:"tag",style:{background:ttBg(s.trainingType),color:ttColor(s.trainingType),fontSize:"9px"}},s.trainingType));
    badges.appendChild(span({class:`tag tag-${s.status==="completed"?"green":s.status==="open"?"blue":"gray"}`,style:{fontSize:"9px"}},s.status));
    if(s.sync==="not_synced"&&s.status==="completed")badges.appendChild(span({class:"tag tag-amber",style:{fontSize:"9px"}},"⚠ Sync pending"));
    r1.appendChild(badges);
    info.appendChild(r1);
    info.appendChild(div({style:{fontSize:"10px",color:C.t3,marginBottom:"4px"}},`📅 ${s.date} · ${s.time} · ${s.dur} · 📍 ${s.store} · 👥 ${s.reg}/${s.cap} enrolled`));
    if(s.assess)info.appendChild(span({class:"tag tag-amber",style:{fontSize:"9px",marginBottom:"4px"}},`Assessment required · Pass score: ${s.passScore}%`));
    const qBtns=div({style:{display:"flex",gap:"6px",marginTop:"6px"}});
    if(s.status==="open")qBtns.appendChild(btn("Mark Delivered","btn-sm btn-primary",()=>{s.status="delivered";render();}));
    if(s.status==="planned")qBtns.appendChild(btn("Open Enrollment","btn-sm btn-secondary",()=>{s.status="open";render();}));
    if(s.status==="delivered")qBtns.appendChild(btn("✅ Mark Complete","btn-sm btn-primary",()=>{s.status="completed";render();}));
    info.appendChild(qBtns);
    row.appendChild(info);
    sCard.appendChild(row);
    wrap.appendChild(sCard);
  });
  return wrap;
}

    kpiRow.appendChild(h("button",{class:"btn",style:{padding:"3px 9px",borderRadius:"20px",fontSize:"10px",fontWeight:"600",border:`1px solid ${isActive?C.blueb:C.b2}`,background:isActive?C.bluel:"#EDEDEA",color:isActive?C.blue:C.t2},onClick:()=>{AC.kpis=isActive?AC.kpis.filter(x=>x!==k):[...AC.kpis,k];render();}},k));
  });
  sec4.appendChild(kpiRow);
  sec4.appendChild(div({class:"fl"},"Trainer notes"));
  sec4.appendChild(h("textarea",{class:"input",placeholder:"Tips for the trainer delivering this course — key concepts, activities, common mistakes...",rows:"3",style:{resize:"vertical"},onInput:e=>{AC.trainerNotes=e.target.value;}},AC.trainerNotes));
  left.appendChild(sec4);

  grid.appendChild(left);

  // RIGHT — LearnLab preview + save
  const rightCol=div({});
  const llPrev=card([],{border:`1px solid ${C.ewm}`,background:C.ewl,marginBottom:"12px"});
  llPrev.appendChild(div({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}},
    div({style:{background:C.ewd,color:"#fff",borderRadius:"7px",padding:"3px 9px",fontSize:"10px",fontWeight:"700"}},"LearnLab"),
    div({style:{fontSize:"12px",fontWeight:"700",color:C.ewd}},"Preview")
  ));
  const prog=PROGRAMS.find(p=>p.id===AC.program);
  llPrev.appendChild(div({style:{background:"rgba(255,255,255,.7)",borderRadius:"8px",padding:"10px 12px"}},
    div({style:{fontSize:"11px",fontWeight:"800",color:C.ewd,marginBottom:"4px"}},"📚 New course: "+(AC.title||"Course title")),
    div({style:{fontSize:"10px",color:C.ewd,opacity:".9",marginBottom:"4px"}},`Program: ${prog?.name||"—"} · Type: ${AC.trainingType}`),
    AC.roles.length?div({style:{fontSize:"10px",color:C.ewd}},`For: ${AC.roles.join(", ")}`):null,
    AC.kpis.length?div({style:{fontSize:"10px",color:C.ewd,marginTop:"3px"}},`KPI impact: ${AC.kpis.join(", ")}`):null
  ));
  rightCol.appendChild(llPrev);

  // Save card
  const saveCard=card([],{background:canSave?C.ewd:"#888",borderColor:"transparent"});
  saveCard.appendChild(div({style:{fontSize:"12px",fontWeight:"700",color:"#fff",marginBottom:"8px"}},"Course summary"));
  [AC.title?["📚",AC.title]:null,prog?["📂",prog.name]:null,AC.trainingType?["🏷",AC.trainingType]:null,AC.roles.length?["👥",AC.roles.join(", ")]:null,AC.cap?["👥",`${AC.cap} capacity`]:null,AC.assess?["✅",`Assessment · Pass ${AC.passScore}%`]:null].filter(Boolean).forEach(([ic,txt])=>{
    saveCard.appendChild(div({style:{fontSize:"10px",color:"rgba(255,255,255,.85)",marginBottom:"3px"}},`${ic} ${txt}`));
  });
  const saveBtn2=h("button",{class:"btn",style:{width:"100%",padding:"10px",marginTop:"12px",fontSize:"12px",background:"#fff",color:canSave?C.ewd:C.t3,cursor:canSave?"pointer":"not-allowed",fontWeight:"700",borderRadius:"8px",border:"none"},onClick:()=>{
    if(!canSave)return;
    const newId="C"+(STATE.courses.length+30);
    STATE.courses.push({id:newId,pid:AC.program,name:AC.title,topic:AC.topic||"GENERAL",sub:AC.title,type:AC.trainingType,roles:AC.roles,cap:AC.cap,assess:AC.assess,passScore:AC.assess?AC.passScore:null,days:AC.days||null,format:AC.format,kpis:AC.kpis,trainerNotes:AC.trainerNotes,desc:AC.desc,code:AC.code});
    AC.done=true;render();
  }},"Save course →");
  saveCard.appendChild(saveBtn2);
  if(!canSave)saveCard.appendChild(div({style:{fontSize:"10px",color:"rgba(255,255,255,.7)",textAlign:"center",marginTop:"6px"}},"Title and program are required"));
  rightCol.appendChild(saveCard);
  grid.appendChild(rightCol);
  wrap.appendChild(grid);
  return wrap;
}

<script>
// ═══════════════════════════════════════════════════════════════════
// CONTENT ADMIN (matching screenshot)

function renderContentAdmin(){
  const sub=STATE.contentSubTab;

    if(badge){const b=span({class:"content-nav-badge",style:{background:badgeColor+"20",color:badgeColor}},badge);item.appendChild(b);}
    nav.appendChild(item);
  });

  // TRAINING OPS
  nav.appendChild(div({class:"content-nav-section"},"TRAINING OPS"));

  ].forEach(({id,l,badge,badgeColor})=>{
    const item=div({class:`content-nav-item${sub===id?" active":""}`,onClick:()=>{STATE.contentSubTab=id;render();}},l);

    nav.appendChild(item);
  });

  // CREATE
  nav.appendChild(div({class:"content-nav-section"},"CREATE"));
  [
    {id:"add_course_nav",l:"+ Add Course",badge:null},
    {id:"add_session_nav",l:"+ Add Session",badge:null},
  ].forEach(({id,l})=>{
    const item=div({class:`content-nav-item`,style:{color:C.ewd,fontWeight:"700"},onClick:()=>{
      if(id==="add_course_nav"){STATE.showAddCourse=true;STATE.showCreateSession=false;}
      if(id==="add_session_nav"){STATE.showCreateSession=true;STATE.showAddCourse=false;resetCS();}
      render();
    }},l);
    nav.appendChild(item);
  });

  // REPORTS
  nav.appendChild(div({class:"content-nav-section"},"REPORTS"));
  nav.appendChild(div({class:`content-nav-item${sub==="trainer_activity"?" active":""}`,onClick:()=>{STATE.contentSubTab="trainer_activity";render();}},"Trainer activity"));

  wrap.appendChild(nav);

  // MAIN CONTENT AREA
  const main=div({style:{flex:"1",overflowY:"auto",padding:"20px"}});

  if(sub==="launcher") main.appendChild(renderBaseerLauncher());
  else if(sub==="review") main.appendChild(renderReviewQueue());
  else if(sub==="baseer") main.appendChild(renderBaseerWorkspace());
  else if(sub==="gaps") main.appendChild(renderContentGaps());
  else if(sub==="planning") main.appendChild(renderPlanningCalendar());
  else if(sub==="sessions_mgr") main.appendChild(renderSessions());
  else if(sub==="store_requests") main.appendChild(renderStoreRequests());
  else if(sub==="certs") main.appendChild(renderCertifications());
  else if(sub==="trainer_activity") main.appendChild(renderTrainerActivity());
  else main.appendChild(div({style:{color:C.t3,padding:"24px"}},"Select a section from the left nav"));

  wrap.appendChild(main);
  return wrap;
}

function renderBaseerLauncher(){
  const wrap=div({});
  const assets=["Course summary (EN + AR)","LearnLab knowledge entry (EN + AR)","Key selling points — 5 bullets","10-question quiz","5 golden sentences (EN + AR)","2 role-play scenarios","Trainer guide (60-min + 20-min floor)","1-page handout (EN + AR, print-ready)","WhatsApp launch message (EN + AR)"];
  const kpiOptions=["AOV","UPT","EG Conversion","Conversion Rate","Insurance Attachment Rate","Lens Upgrade Rate"];

  // Upload zone
  const uploadZone=div({style:{border:"2px dashed #CECEC8",borderRadius:"12px",padding:"32px",textAlign:"center",marginBottom:"20px",cursor:"pointer",background:STATE.baseerGenerated?"#e8f5ef":"#fff",borderColor:STATE.baseerGenerated?C.ewm:"#CECEC8"},onClick:()=>{if(!STATE.baseerGenerated)alert("File upload simulation — in production this opens a file picker");}});
  if(STATE.baseerGenerated){
    uploadZone.appendChild(div({style:{fontSize:"24px",marginBottom:"8px"}},"✅"));
    uploadZone.appendChild(div({style:{fontSize:"16px",fontWeight:"700",color:C.ewd,marginBottom:"4px"}},"File uploaded — Baseer is working"));
    uploadZone.appendChild(div({style:{fontSize:"12px",color:C.t3}},"NYLO_SS26_Collection_Brief.pdf · 4.2 MB"));
  } else {
    uploadZone.appendChild(div({style:{fontSize:"16px",fontWeight:"700",color:C.t1,marginBottom:"6px"}},"Drop file or click to upload"));
    uploadZone.appendChild(div({style:{fontSize:"12px",color:C.t3,marginBottom:"4px"}},"PDF · PPT · Word · Video · Brand guide · SOP · Any format"));
    uploadZone.appendChild(div({style:{fontSize:"11px",color:C.t3}},"Baseer reads it and generates 9 training assets in 90 seconds"));
  }
  wrap.appendChild(uploadZone);

  const cols=div({style:{display:"grid",gridTemplateColumns:"1fr 360px",gap:"20px"}});

  // Settings
  const settCard=div({class:"card"});
  settCard.appendChild(div({style:{fontSize:"16px",fontWeight:"700",color:C.t1,marginBottom:"16px"}},"Content settings"));

  settCard.appendChild(div({class:"fl"},"CONTENT TYPE"));
  const ctSelect=h("select",{class:"input",style:{marginBottom:"16px"}});
  ["New collection launch","Brand training","Product knowledge","Selling skills","Compliance","Onboarding"].forEach(o=>{const opt=h("option",{value:o},o);if(o==="New collection launch")opt.selected=true;ctSelect.appendChild(opt);});
  settCard.appendChild(ctSelect);

  settCard.appendChild(div({class:"fl"},"ASSIGN TO ROLES"));
  const rolesPills=div({style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}});
  const activeRoles=["SA","Senior SA","SIC","SM","Optometrist"];
  ["SA","Junior SA","Senior SA","SIC","SM","Optometrist","Optician"].forEach(r=>{
    const active=activeRoles.includes(r);
    rolesPills.appendChild(span({style:{padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:"600",background:active?C.ewd:"#EEE",color:active?"#fff":C.t3,cursor:"pointer"}},r));
  });
  settCard.appendChild(rolesPills);

  settCard.appendChild(div({class:"fl"},"CX PHASE"));
  const cxSelect=h("select",{class:"input",style:{marginBottom:"16px"}});
  ["Phase 1 — Welcome & Greet","Phase 2 — Discover & Style","Phase 3 — Recommend & Close","Phase 4 — Collection Ceremony","All phases"].forEach(o=>{const opt=h("option",{value:o},o);if(o==="Phase 2 — Discover & Style")opt.selected=true;cxSelect.appendChild(opt);});
  settCard.appendChild(cxSelect);

  settCard.appendChild(div({class:"fl"},"LINKED KPIS"));
  const kpiRow=div({style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}});
  const activeKpis=["AOV","UPT","EG Conversion"];
  kpiOptions.forEach(k=>{
    const active=activeKpis.includes(k);
    kpiRow.appendChild(span({style:{padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:"600",background:active?C.ambl:"#EEE",color:active?C.amb:C.t3,cursor:"pointer"}},k));
  });
  settCard.appendChild(kpiRow);

  settCard.appendChild(div({class:"fl"},"LANGUAGE"));
  const langSelect=h("select",{class:"input"});
  ["English + Arabic (auto-translate)","English only","Arabic only"].forEach(o=>{const opt=h("option",{value:o},o);if(o==="English + Arabic (auto-translate)")opt.selected=true;langSelect.appendChild(opt);});
  settCard.appendChild(langSelect);
  cols.appendChild(settCard);

  // Assets panel
  const assetsCard=div({class:"card",style:{border:`1px solid ${STATE.baseerGenerated?C.ewm:C.b1}`}});
  const assetsHdr=div({style:{marginBottom:"4px"}});
  assetsHdr.appendChild(div({style:{fontSize:"16px",fontWeight:"700",color:C.t1}},"Baseer generates — 9 assets"));
  assetsHdr.appendChild(div({style:{fontSize:"11px",color:C.t3,marginBottom:"14px"}},"All go to review queue before publishing"));
  assetsCard.appendChild(assetsHdr);
  assets.forEach((a,i)=>{
    const row=div({style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:i<assets.length-1?`1px solid ${C.b1}`:"none"}});
    const checkbox=div({style:{width:"18px",height:"18px",borderRadius:"4px",border:`2px solid ${STATE.baseerGenerated?C.ew:C.b2}`,flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"center",background:STATE.baseerGenerated?C.ewl:"#fff"}},STATE.baseerGenerated?span({style:{color:C.ew,fontSize:"11px",fontWeight:"700"}},"✓"):null);
    row.appendChild(checkbox);
    row.appendChild(span({style:{fontSize:"11px",color:STATE.baseerGenerated?C.ewd:C.t1,fontWeight:STATE.baseerGenerated?"600":"400"}},a));
    if(STATE.baseerGenerated)row.appendChild(span({class:"tag tag-green",style:{marginLeft:"auto",fontSize:"9px"}},"Ready"));
    assetsCard.appendChild(row);
  });

  // Generate button
  const genBtn=h("button",{style:{width:"100%",padding:"14px",background:C.ewd,border:"none",borderRadius:"10px",color:"#fff",fontSize:"14px",fontWeight:"700",cursor:"pointer",marginTop:"14px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},onClick:()=>{
    if(STATE.baseerLoading||STATE.baseerGenerated)return;
    STATE.baseerLoading=true;render();
    setTimeout(()=>{STATE.baseerLoading=false;STATE.baseerGenerated=true;STATE.contentSubTab="review";render();},2000);
  }});
  if(STATE.baseerLoading){
    genBtn.appendChild(div({style:{width:"16px",height:"16px",border:"2px solid rgba(255,255,255,.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}));
    genBtn.appendChild(span({},"Baseer is working..."));
    const style=h("style",{},"@keyframes spin{to{transform:rotate(360deg)}}");
    document.head.appendChild(style);
  } else if(STATE.baseerGenerated){
    genBtn.textContent="✅ Assets generated — in review queue";
    genBtn.style.background=C.ew;
  } else {
    genBtn.textContent="Generate & launch pipeline →";
  }
  assetsCard.appendChild(genBtn);
  cols.appendChild(assetsCard);
  wrap.appendChild(cols);
  return wrap;
}

function renderReviewQueue(){
  const wrap=div({});
  wrap.appendChild(div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}},
    div({},div({style:{fontSize:"15px",fontWeight:"800"}},"Review queue"),div({style:{fontSize:"10px",color:C.t3,marginTop:"1px"}},"AI-generated assets awaiting your review and approval")),
    span({class:"tag tag-red",style:{fontSize:"11px"}},`${STATE.reviewQueueItems.filter(i=>i.status==="pending").length} pending`)
  ));
  STATE.reviewQueueItems.forEach(item=>{
    const row=div({class:"card",style:{marginBottom:"8px",borderLeft:`4px solid ${item.status==="approved"?C.ew:item.status==="rejected"?C.red:C.amb}`}});
    const inner=div({style:{display:"flex",alignItems:"center",gap:"12px"}});
    inner.appendChild(div({style:{width:"36px",height:"36px",borderRadius:"8px",background:C.ewd,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:"0"}},"🤖"));
    inner.appendChild(div({style:{flex:"1"}},
      div({style:{fontSize:"12px",fontWeight:"700",color:C.t1,marginBottom:"2px"}},item.title),
      div({style:{fontSize:"10px",color:C.t3}},`${item.type} · Generated by ${item.ai}`)
    ));
    const status=item.status;
    if(status==="pending"){
      const acts=div({style:{display:"flex",gap:"6px"}});
      acts.appendChild(btn("✓ Approve","btn-sm btn-primary",()=>{item.status="approved";render();}));
      acts.appendChild(btn("✗ Reject","btn-sm btn-danger",()=>{item.status="rejected";render();}));
      acts.appendChild(btn("Edit","btn-sm btn-ghost",()=>{alert("Opens editor for: "+item.title);}));
      inner.appendChild(acts);
    } else {
      inner.appendChild(span({class:`tag tag-${status==="approved"?"green":"red"}`},status==="approved"?"✓ Approved":"✗ Rejected"));
    }
    row.appendChild(inner);
    wrap.appendChild(row);
  });
  return wrap;
}

// ═══════════════════════════════════════════════════════════════════
function renderCalendar(){
  const wrap=div({});
  wrap.appendChild(sh("Master calendar","April 2026 · All regions",btn("+ Schedule session","btn-primary btn",()=>{STATE.showCreateSession=true;render();})));
  // Simple month grid
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const daysHdr=div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"4px"}});
  days.forEach(d=>daysHdr.appendChild(div({style:{textAlign:"center",fontSize:"10px",fontWeight:"700",color:C.t3,padding:"4px"}},d)));
  wrap.appendChild(daysHdr);
  const grid2=div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"14px"}});
  // April 2026 starts on Wednesday (3)
  for(let i=0;i<3;i++)grid2.appendChild(div({style:{background:"transparent",minHeight:"70px"}}));
  for(let d=1;d<=30;d++){
    const dateStr=`2026-04-${String(d).padStart(2,"0")}`;
    const daySessions=STATE.sessions.filter(s=>s.date===dateStr);
    const blocked=isBlocked(dateStr);
    const isToday=d===18;
    const cell=div({style:{background:isToday?C.ewl:blocked?.type==="hard"?C.redl:"#fff",border:`1px solid ${isToday?C.ewm:blocked?C.redb:C.b1}`,borderRadius:"6px",padding:"4px",minHeight:"70px",cursor:daySessions.length?"pointer":"default"},onClick:()=>{if(daySessions.length)alert("Sessions on Apr "+d+":\n"+daySessions.map(s=>s.course+" · "+s.time+" · "+s.store).join("\n"));}});
    cell.appendChild(div({style:{fontSize:"10px",fontWeight:isToday?"800":"600",color:isToday?C.ewd:blocked?C.red:C.t2,marginBottom:"3px"}},String(d)+(isToday?" ·Today":"")));
    if(blocked)cell.appendChild(div({style:{fontSize:"8px",color:C.red,fontWeight:"600"}},blocked.label.substring(0,15)));

  return wrap;
}

  return wrap;

      store.issues.forEach(issue=>{
        const im=ISSUE_META[issue];const course2=STATE.courses.find(c=>c.id===im?.course);
        const el=div({style:{background:im?.bg,borderRadius:"10px",padding:"11px 13px",marginBottom:"8px",border:`1px solid ${im?.color}30`,borderLeft:`3px solid ${im?.color}`}});
        el.appendChild(div({style:{fontSize:"12px",fontWeight:"700",color:im?.color,marginBottom:"3px"}},`${im?.icon} ${im?.label}`));
        el.appendChild(div({style:{fontSize:"10px",color:C.t2,marginBottom:"4px"}},im?.desc));
        if(course2)el.appendChild(div({style:{fontSize:"10px",color:C.t3}},`Recommended: `,span({style:{fontWeight:"700",color:C.ewd}},course2.name)));
        issueCard.appendChild(el);
      });
      left2.appendChild(issueCard);
    }

    if(storeActions.length>0){
      const actCard=card([],{});
      actCard.appendChild(sh("Training actions","System-generated · being actioned"));
      storeActions.slice(0,4).forEach(a=>{
        const row=div({style:{display:"flex",alignItems:"flex-start",gap:"10px",padding:"8px 0",borderBottom:`1px solid ${C.b1}`}});
        row.appendChild(span({style:{fontSize:"14px",flexShrink:"0"}},a.sourceIcon));
        row.appendChild(div({style:{flex:"1"}},
          div({style:{fontSize:"11px",fontWeight:"700"}},a.gap),
          div({style:{fontSize:"10px",color:C.t3}},a.person+" · "+a.course?.substring(0,30)+(a.course?.length>30?"…":""))
        ));
        row.appendChild(span({class:`tag tag-${a.status==="scheduled"?"blue":a.status==="assigned"?"amber":"gray"}`},a.status));
        actCard.appendChild(row);
      });
      left2.appendChild(actCard);
    }
    grid2.appendChild(left2);

    const right2=div({});
    const visitCard=card([],{marginBottom:"12px"});
    visitCard.appendChild(sh("Next trainer visit"));
    if(store.nextVisit){
      visitCard.appendChild(div({style:{background:C.ewl,borderRadius:"9px",padding:"11px",border:`1px solid ${C.ewm}`,textAlign:"center"}},
        div({style:{fontSize:"16px",fontWeight:"800",color:C.ewd,marginBottom:"2px"}},store.nextVisit),
        div({style:{fontSize:"10px",color:C.ewd}},"Mohammad Othman"),
        div({style:{fontSize:"10px",color:C.ewd,marginTop:"2px"}},"CLARIVO Coaching")
      ));
    } else {
      visitCard.appendChild(div({style:{background:"#F8F8F6",borderRadius:"9px",padding:"11px",textAlign:"center"}},
        div({style:{fontSize:"12px",color:C.red,fontWeight:"600",marginBottom:"6px"}},"No visit scheduled"),
        btn("Request trainer visit","btn-sm btn-secondary",()=>{alert("Request submitted");})
      ));
    }
    right2.appendChild(visitCard);

    const sessCard=card([],{marginBottom:"12px"});
    sessCard.appendChild(sh("Upcoming sessions"));
    upSessions.slice(0,3).forEach(s=>{
      const row=div({style:{padding:"7px 0",borderBottom:`1px solid ${C.b1}`}});
      row.appendChild(div({style:{fontSize:"11px",fontWeight:"600"}},s.course.length>28?s.course.substring(0,28)+"…":s.course));
      row.appendChild(div({style:{fontSize:"9px",color:C.t3}},`${s.date} · ${s.time} · ${s.reg}/${s.cap}`));
      if(s.status==="open")row.appendChild(btn("Nominate staff →","btn-sm btn-secondary",()=>{alert("Nominate staff for: "+s.course);}));
      sessCard.appendChild(row);
    });
    right2.appendChild(sessCard);

    right2.appendChild(card(div({style:{fontSize:"11px",color:C.ewd,lineHeight:"1.7"}},
      div({style:{fontWeight:"700",marginBottom:"6px"}},"💡 Training insight"),
      `Your store is ${store.conv.target-store.conv.current}pts below target. Discovery and objection skills are the primary gaps. The next trainer visit covers CLARIVO coaching — ensure full team presence.`
    ),{background:C.ewl,border:`1px solid ${C.ewm}`}));
    grid2.appendChild(right2);
    wrap.appendChild(grid2);
  }

  else if(STATE.smTab==="training"){
    const tCard=card([],{});
    tCard.appendChild(sh("Training calendar","Sessions for your store",btn("+ Request training","btn-sm btn-secondary",()=>{STATE.smTab="requests";render();})));
    upSessions.forEach(s=>{
      const row=div({style:{display:"flex",alignItems:"center",gap:"9px",padding:"9px 0",borderBottom:`1px solid ${C.b1}`}});
      row.appendChild(div({style:{width:"40px",textAlign:"center",flexShrink:"0"}},
        div({style:{fontSize:"15px",fontWeight:"800"}},s.date.split("-")[2]),
        div({style:{fontSize:"9px",color:C.t3}},"Apr")
      ));
      row.appendChild(div({style:{width:"3px",height:"36px",borderRadius:"2px",background:typeColor(s.type),flexShrink:"0"}}));
      row.appendChild(div({style:{flex:"1"}},
        div({style:{fontSize:"11px",fontWeight:"700"}},s.course),
        div({style:{fontSize:"10px",color:C.t3}},`${typeLabel(s.type)} · ${s.time} · ${s.store}`)
      ));
      const right3=div({style:{flexShrink:"0"}});
      right3.appendChild(div({style:{fontSize:"10px",color:C.t3}},`${s.reg}/${s.cap}`));
      if(s.status==="open")right3.appendChild(btn("Nominate →","btn-sm btn-secondary",()=>{alert("Nominate staff for: "+s.course);}));
      row.appendChild(right3);
      tCard.appendChild(row);
    });
    wrap.appendChild(tCard);
  }

  else if(STATE.smTab==="team"){
    const tCard=card([],{});
    tCard.appendChild(sh("My team — Al Yasmin Mall","11 staff · training status"));
    const table=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"11px"}});
    const thead=h("thead",{}),tr0=h("tr",{});
    ["Name","Role","Score","Mandatory","Status"].forEach(col=>tr0.appendChild(h("th",{style:{fontSize:"9px",fontWeight:"700",color:C.t3,padding:"5px 8px",borderBottom:`1px solid ${C.b1}`,textAlign:"left",textTransform:"uppercase",letterSpacing:".05em"}},col)));
    thead.appendChild(tr0);table.appendChild(thead);
    const tbody=h("tbody",{});
    TEAM.forEach(s=>{
      const pct=Math.round(s.mandatory_done/s.mandatory_total*100);
      const tr=h("tr",{});
      tr.appendChild(h("td",{style:{padding:"7px 8px",borderBottom:`1px solid ${C.b1}`,fontWeight:"700"}},s.nm));
      tr.appendChild(h("td",{style:{padding:"7px 8px",borderBottom:`1px solid ${C.b1}`}},span({class:"tag tag-gray"},s.role)));
      tr.appendChild(h("td",{style:{padding:"7px 8px",borderBottom:`1px solid ${C.b1}`}},span({class:`tag tag-${s.score>=80?"green":s.score>=65?"amber":"red"}`},s.score+"%")));
      const prog2=h("td",{style:{padding:"7px 8px",borderBottom:`1px solid ${C.b1}`}});
      const pbar=div({style:{display:"flex",alignItems:"center",gap:"5px"}});
      pbar.appendChild(div({style:{width:"40px",height:"4px",background:"#EEE",borderRadius:"2px",overflow:"hidden"}},div({style:{height:"100%",background:pctColor(pct),width:pct+"%"}})));
      pbar.appendChild(span({style:{fontSize:"10px",color:pctColor(pct),fontWeight:"600"}},`${s.mandatory_done}/${s.mandatory_total}`));
      prog2.appendChild(pbar);tr.appendChild(prog2);
      const flag=h("td",{style:{padding:"7px 8px",borderBottom:`1px solid ${C.b1}`}});
      if(s.score<65)flag.appendChild(span({class:"tag tag-red"},"Gap"));
      else if(s.ll==="inactive")flag.appendChild(span({class:"tag tag-amber"},"Inactive"));
      else flag.textContent="—";
      tr.appendChild(flag);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tCard.appendChild(table);
    wrap.appendChild(tCard);
  }

  else if(STATE.smTab==="requests"){
    const rCard=card([],{});
    rCard.appendChild(sh("Training requests","Al Yasmin Mall",btn("+ New request","btn-sm btn-primary",()=>{alert("Request form — opens in next sprint");})));
    [{t:"Insurance refresher",status:"Scheduled · Apr 10",v:"green"},{t:"Rimless brand module",status:"In progress",v:"amber"}].forEach(r=>{
      const row=div({style:{padding:"10px 0",borderBottom:`1px solid ${C.b1}`}});
      const inner=div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}});
      inner.appendChild(div({style:{fontSize:"12px",fontWeight:"700"}},r.t));
      inner.appendChild(span({class:`tag tag-${r.v}`},r.status));
      row.appendChild(inner);
      rCard.appendChild(row);
    });
    wrap.appendChild(rCard);
  }
  return wrap;
}

// ═══════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const topBar=renderTopBar();
  app.appendChild(topBar);

  const view=VIEWS[STATE.viewIdx];
  const isMobile=STATE.viewIdx===0;
  const main=div({style:{flex:"1",overflowY:"auto",padding:isMobile?"12px":"0",background:isMobile?"#F5F5F3":C.bg,display:"flex",flexDirection:"column"}});

  let content=null;

  if(isMobile){
    if(STATE.showCreateSession){content=renderCreateSession();}
    else content=renderMobileTrainer();
  } else {
    const wrapStyle={flex:"1",overflowY:"auto",padding:"16px 18px"};
    if(STATE.tab==="content"&&!STATE.showCreateSession&&!STATE.showAddCourse){
      // Content admin has its own layout with left nav
      const contentWrap=div({style:{flex:"1",display:"flex",overflow:"hidden"}});
      contentWrap.appendChild(renderContentAdmin());
      main.appendChild(contentWrap);
      app.appendChild(main);
      return;
    }
    const contentPad=div({style:wrapStyle});
    if(STATE.showAddCourse){contentPad.appendChild(renderAddCourse());}
    else if(STATE.showCreateSession){contentPad.appendChild(renderCreateSession());}
    else if(STATE.tab==="dashboard")contentPad.appendChild(renderAdminDashboard());
    else if(STATE.tab==="conversion")contentPad.appendChild(renderConversionEngine());
    else if(STATE.tab==="actions")contentPad.appendChild(renderActions());
    else if(STATE.tab==="sessions")contentPad.appendChild(renderSessions());
    else if(STATE.tab==="calendar")contentPad.appendChild(renderCalendar());
    else if(STATE.tab==="assessments")contentPad.appendChild(renderAssessments());
    else if(STATE.tab==="trainers")contentPad.appendChild(renderTrainerMgmt());
    else if(STATE.tab==="academy")contentPad.appendChild(renderAcademy());
    else if(STATE.tab==="sm_conv")contentPad.appendChild(renderSMDashboard());
    else contentPad.appendChild(div({style:{color:C.t3,padding:"24px"}},"Select a tab"));
    main.appendChild(contentPad);
  }

  if(isMobile&&content){const wrap=div({style:{maxWidth:"430px",margin:"0 auto"}});wrap.appendChild(content);main.appendChild(wrap);}

  app.appendChild(main);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
