<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eyewa Store Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F0E8;--bg2:#EDE8DC;--card:#fff;--border:#DDD5C4;--border2:#C8BFA8;
  --g:#1DB954;--gd:#158A3E;--gl:rgba(29,185,84,.1);--gb:rgba(29,185,84,.22);
  --t1:#18181A;--t2:#44444C;--t3:#767676;--t4:#ABABAB;
  --red:#D93025;--redbg:rgba(217,48,37,.08);--amb:#C07818;--ambbg:rgba(192,120,24,.08);
  --blue:#1A56DB;--bluebg:rgba(26,86,219,.08);--purp:#7C3AED;--purpbg:rgba(124,58,237,.08);
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);--ease:cubic-bezier(.16,1,.3,1)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .15s var(--ease)}
input,select,textarea{font-family:inherit;outline:none;transition:all .15s}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes in{from{opacity:0}to{opacity:1}}
@keyframes sc{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(29,185,84,.1) 0%,transparent 60%)}
.lb{width:100%;max-width:380px;animation:up .4s var(--ease)}
.lb-brand{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.lb-icon{width:32px;height:32px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(29,185,84,.32)}
.lb-icon svg{width:16px;height:16px;fill:#fff}
.lb-name{font-size:19px;font-weight:800;letter-spacing:-.4px}
.lb-sub{font-size:11px;color:var(--t3);margin-bottom:28px;padding-left:41px}
.lb-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--sh)}
.lf{margin-bottom:13px}
.lf label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.li{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--t1)}
.li:focus{border-color:var(--g);background:var(--card);box-shadow:0 0 0 3px var(--gl)}
.li::placeholder{color:var(--t4)}
.le{display:none;font-size:11px;color:var(--red);margin-bottom:11px;background:var(--redbg);padding:7px 10px;border-radius:7px;border-left:3px solid var(--red)}
.lbtn{width:100%;padding:12px;background:var(--g);border-radius:9px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 3px 10px rgba(29,185,84,.3)}
.lbtn:hover{background:var(--gd);transform:translateY(-1px)}
.lhint{margin-top:12px;font-size:10px;color:var(--t4);text-align:center}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--g);padding:14px 16px;color:#fff;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.tb-l{flex:1;min-width:0}
.tb-sname{font-size:14px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sm{font-size:10px;opacity:.75}
.tb-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-conv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1}
.tb-out{background:rgba(255,255,255,.15);border:none;border-radius:7px;padding:5px 10px;color:#fff;font-size:10px;font-weight:600}
.tab-nav{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border)}.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{height:44px;padding:0 15px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:600;color:var(--t3);white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--t2)}.tab-btn.on{color:var(--g);border-bottom-color:var(--g);font-weight:700}
.main{padding:15px;flex:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;box-shadow:var(--sh);margin-bottom:12px}
.tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap}
.tg{background:var(--gl);color:var(--g);border:1px solid var(--gb)}.tr{background:var(--redbg);color:var(--red);border:1px solid rgba(217,48,37,.2)}
.ta{background:var(--ambbg);color:var(--amb);border:1px solid rgba(192,120,24,.2)}.tx{background:var(--bg2);color:var(--t3);border:1px solid var(--border)}
.tb2{background:var(--bluebg);color:var(--blue);border:1px solid rgba(26,86,219,.2)}.tp{background:var(--purpbg);color:var(--purp);border:1px solid rgba(124,58,237,.2)}
.btn{padding:8px 15px;border-radius:9px;font-size:11px;font-weight:700;border:1px solid transparent;transition:all .15s var(--ease)}
.bp{background:var(--g);color:#fff;box-shadow:0 2px 7px rgba(29,185,84,.28)}.bp:hover{background:var(--gd)}
.bg2{background:transparent;border-color:var(--border);color:var(--t3)}.bg2:hover{background:var(--bg2)}
.inp{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:12px;color:var(--t1)}
.inp:focus{border-color:var(--g);background:var(--card);box-shadow:0 0 0 3px var(--gl)}
.inp::placeholder{color:var(--t4)}
.pb{height:4px;background:var(--bg2);border-radius:4px;overflow:hidden}.pbf{height:100%;border-radius:4px;transition:width .6s var(--ease)}
.mo{position:fixed;inset:0;background:rgba(20,20,20,.5);backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center;z-index:500;padding:0;animation:in .2s}
.mo-box{background:var(--card);border-radius:18px 18px 0 0;padding:24px;width:100%;max-width:500px;animation:sc .25s var(--ease);max-height:90vh;overflow-y:auto}
.mo-box h3{font-size:16px;font-weight:800;margin-bottom:3px}
.mo-sub{font-size:11px;color:var(--t3);margin-bottom:16px}
.mf{margin-bottom:12px}.mf label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.ma{display:flex;gap:7px;margin-top:18px}
#toasts{position:fixed;bottom:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;animation:up .25s var(--ease);display:flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(0,0,0,.12);pointer-events:all}
.toast.ok{border-left:3px solid var(--g)}.toast.err{border-left:3px solid var(--red)}
</style>
</head>
<body>
<div id="toasts"></div>

<div id="login">
  <div class="lb">
    <div class="lb-brand">
      <div class="lb-icon"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></div>
      <span class="lb-name">eyewa ECIP</span>
    </div>
    <div class="lb-sub">Store Manager Portal · KSA</div>
    <div class="lb-card">
      <div class="lf"><label>Store code</label><input class="li" id="sc" type="text" placeholder="e.g. PAM" autocomplete="off"></div>
      <div class="lf" style="margin-bottom:18px"><label>Password</label><input class="li" id="sp" type="password" placeholder="••••••••"></div>
      <div class="le" id="lerr"></div>
      <button class="lbtn" onclick="doLogin()">Enter →</button>
    </div>
    <div class="lhint">Default password = store code lowercase · e.g. PAM → pam</div>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-sname" id="sname">Store</div>
      <div class="tb-sm" id="smname">Store Manager</div>
    </div>
    <div class="tb-r">
      <div class="tb-conv" id="conv-disp">—%</div>
      <button class="tb-out" onclick="doLogout()">Out</button>
    </div>
  </div>
  <div class="tab-nav" id="tabs"></div>
  <div class="main" id="main"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz9GOBhvUtpsBEAzWIDB4B0ENrGlOkS49cHmvuGBvU66fjW7CC6maysbuzD8YkTjpWt/exec';

async function call(action, data={}) {
  const GET=['getStores','getSessions','getRequests','ping'];
  try {
    if(GET.includes(action)){const r=await fetch(`${API}?${new URLSearchParams({action,...data})}`);const j=await r.json();return j.ok?j.data:null;}
    else{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,...data})});const j=await r.json();return j.ok?j.data:null;}
  } catch(e){console.warn('[API]',e.message);return null;}
}

function toast(msg,type='ok',ms=3000){
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<span>${type==='ok'?'✅':'❌'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.cssText='opacity:0;transition:opacity .3s';setTimeout(()=>el.remove(),300);},ms);
}

const GAP={discovery_gap:{l:'Discovery Gap',t:'tr',i:'🎯',course:'Needs Discovery'},objection_handling:{l:'Objection Handling',t:'tr',i:'🛡',course:'Objection Handling'},product_knowledge:{l:'Product Knowledge',t:'ta',i:'📦',course:'CLARIVO Lens'},engagement_gap:{l:'Engagement Gap',t:'ta',i:'💬',course:'Guest Experience'},onboarding_gap:{l:'Onboarding Gap',t:'tp',i:'🆕',course:'Retail Induction'}};
const pcc=p=>p>=55?'var(--g)':p>=48?'var(--amb)':'var(--red)';
const RISK={high_risk:{l:'High Risk',t:'tr'},medium:{l:'Medium',t:'ta'},stable:{l:'Stable',t:'tg'},top_performer:{l:'Top Performer',t:'tb2'}};

let CS=null,TAB='overview',D={store:null,sessions:[],requests:[]};

async function doLogin(){
  const code=document.getElementById('sc').value.trim().toUpperCase();
  const pass=document.getElementById('sp').value.trim();
  const errEl=document.getElementById('lerr');
  const lBtn=document.querySelector('.lbtn');
  errEl.style.display='none';
  lBtn.textContent='Signing in...';lBtn.style.opacity='.7';lBtn.style.pointerEvents='none';

  // Try API first
  let user=await call('login',{storeCode:code,password:pass});

  // Local fallback for key stores
  if(!user){
    const LOC={PAM:{n:'Panorama Mall',sm:'Sara Zaid Alanazi',p:'pam',r:'Central',conv:{cur:51,tgt:55,prev:53},mand:72,staff:11,issues:['discovery_gap'],risk:'medium'},
               NKL:{n:'Nakheel Mall',sm:'TBA',p:'nkl',r:'Central',conv:{cur:42,tgt:55,prev:40},mand:50,staff:9,issues:['objection_handling'],risk:'high_risk'},
               YSM:{n:'Al Yasmin Mall',sm:'Ahmed Asiri',p:'ysm',r:'Central',conv:{cur:38,tgt:55,prev:41},mand:75,staff:11,issues:['discovery_gap','objection_handling'],risk:'high_risk'},
               ARD:{n:'Al Aared Mall',sm:'TBA',p:'ard',r:'Central',conv:{cur:53,tgt:55,prev:52},mand:83,staff:6,issues:['engagement_gap'],risk:'medium'},
               RPT:{n:'Riyadh Park',sm:'Yazan Alqarni',p:'rpt',r:'Central',conv:{cur:62,tgt:55,prev:60},mand:88,staff:9,issues:[],risk:'stable'},
               MOA:{n:'Mall of Arabia',sm:'Ahmed Shawish',p:'moa',r:'Western',conv:{cur:35,tgt:55,prev:38},mand:42,staff:9,issues:['onboarding_gap','discovery_gap'],risk:'high_risk'},
               KKA:{n:'King Khalid Airport',sm:'Sarah Alobaid',p:'kka',r:'Central',conv:{cur:64,tgt:55,prev:62},mand:90,staff:8,issues:[],risk:'top_performer'},
               MAD:{n:'Dareen Mall',sm:'Hadeel Alshorman',p:'mad',r:'Eastern',conv:{cur:44,tgt:55,prev:46},mand:64,staff:9,issues:['discovery_gap'],risk:'high_risk'},
               GRD:{n:'Gulf Rd',sm:'Dina Aldossary',p:'grd',r:'Eastern',conv:{cur:49,tgt:55,prev:50},mand:68,staff:8,issues:['engagement_gap'],risk:'medium'},
               REM:{n:'Red Sea Mall',sm:'Ahmed A Asiri',p:'rem',r:'Western',conv:{cur:40,tgt:55,prev:43},mand:33,staff:10,issues:['onboarding_gap','discovery_gap'],risk:'high_risk'},
    };
    const l=LOC[code];if(l&&(pass===l.p||pass===code.toLowerCase())) user={type:'store_manager',storeCode:code,storeName:l.n,smName:l.sm,region:l.r,conv:l.conv,mandatoryPct:l.mand,staffCount:l.staff,issues:l.issues,riskLevel:l.risk};
  }

  lBtn.textContent='Enter →';lBtn.style.opacity='';lBtn.style.pointerEvents='';

  if(!user){errEl.style.display='block';errEl.textContent='⚠ Incorrect store code or password.';return;}

  CS=user;
  // If API returned flat data, structure it
  if(!CS.conv) CS.conv={cur:Number(CS.conv_current)||0,tgt:Number(CS.conv_target)||55,prev:Number(CS.conv_prev_week)||0};
  if(!CS.issues) CS.issues=(CS.issues_raw||'').split(',').filter(Boolean);

  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sname').textContent=CS.storeName||CS.store_name||code;
  document.getElementById('smname').textContent=(CS.smName||CS.sm_name||'Store Manager')+' · Store Manager';
  document.getElementById('conv-disp').textContent=(CS.conv?.cur||0)+'%';
  buildTabs(); loadData(); render();
}

function doLogout(){CS=null;D={store:null,sessions:[],requests:[]};document.getElementById('login').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('sc').value='';document.getElementById('sp').value='';}
document.getElementById('sp').onkeydown=e=>{if(e.key==='Enter')doLogin();};
document.getElementById('sc').oninput=e=>{e.target.value=e.target.value.toUpperCase();};

async function loadData(){
  const code=CS.storeCode||CS.store_code;
  const [sessions,requests]=await Promise.all([call('getSessions',{storeCode:code}),call('getRequests',{storeCode:code})]);
  D.sessions=sessions||[];D.requests=requests||[];
  if(['sessions','requests'].includes(TAB)) render();
}

function buildTabs(){
  const nav=document.getElementById('tabs');nav.innerHTML='';
  [['overview','📊 Overview'],['team','👥 My Team'],['sessions','📅 Sessions'],['requests','📩 Requests']].forEach(([id,l])=>{
    const b=document.createElement('button');b.className=`tab-btn${TAB===id?' on':''}`;b.textContent=l;
    b.onclick=()=>{TAB=id;render();};nav.appendChild(b);
  });
}

function render(){
  buildTabs();
  const m=document.getElementById('main');m.innerHTML='';
  if(TAB==='overview') m.appendChild(vOverview());
  else if(TAB==='team') m.appendChild(vTeam());
  else if(TAB==='sessions') m.appendChild(vSessions());
  else if(TAB==='requests') m.appendChild(vRequests());
}

// ── OVERVIEW ────────────────────────────────────────
function vOverview(){
  const w=document.createElement('div');w.style.animation='up .35s var(--ease) both';
  const pct=CS.conv?.cur||0;const tgt=CS.conv?.tgt||55;const gap=tgt-pct;
  const rm=RISK[CS.riskLevel||CS.risk_level]||RISK.medium;

  // Hero conversion card
  const hero=document.createElement('div');
  hero.className='card';hero.style.background=`linear-gradient(135deg,var(--g),${pct>=55?'#0d7a34':'#158A3E'})`;
  hero.style.border='none';hero.style.marginBottom='12px';
  hero.innerHTML=`
    <div style="color:#fff">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">${CS.storeName||CS.storeCode} · ${CS.region||''}</div>
          <div style="font-size:17px;font-weight:800;margin-bottom:6px">Conversion Dashboard</div>
          <span class="tag" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)">${rm.l}</span>
        </div>
        <div style="text-align:right">
          <div style="font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;line-height:1;letter-spacing:-2px">${pct}%</div>
          <div style="font-size:10px;opacity:.7">Target: ${tgt}%</div>
        </div>
      </div>
      <div style="height:6px;background:rgba(255,255,255,.25);border-radius:6px;overflow:hidden;position:relative;margin-bottom:4px">
        <div style="height:100%;width:${Math.min((pct/70)*100,100)}%;background:rgba(255,255,255,.85);border-radius:6px;transition:width .7s var(--ease)"></div>
        <div style="position:absolute;top:0;left:${Math.min((tgt/70)*100,100)}%;width:2px;height:100%;background:rgba(255,255,255,.5)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;opacity:.6"><span>0%</span><span>Target ${tgt}%</span><span>70%</span></div>
    </div>`;
  w.appendChild(hero);

  // Stats row
  const sg=document.createElement('div');sg.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px;margin-bottom:12px';
  [[pct+'%','This week',pcc(pct)],[(CS.conv?.prev||0)+'%','Last week','var(--t3)'],[(CS.mandatoryPct||CS.mandatory_pct||0)+'%','Mandatory','var(--purp)'],[(CS.staffCount||CS.staff_count||0)+' staff','Team','var(--g)']].forEach(([v,l,c])=>{
    const s=document.createElement('div');s.className='card';s.style.textAlign='center';s.style.padding='12px 8px';
    s.innerHTML=`<div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:${c};margin-bottom:3px">${v}</div><div style="font-size:9px;color:var(--t3)">${l}</div>`;
    sg.appendChild(s);
  });
  w.appendChild(sg);

  // Issues
  const issues=CS.issues||[];
  if(issues.length){
    const ic=document.createElement('div');ic.className='card';ic.style.marginBottom='12px';
    ic.innerHTML=`<div style="font-size:12px;font-weight:700;margin-bottom:10px">Why conversion is below target</div>`;
    issues.forEach(g=>{
      const gm=GAP[g];if(!gm)return;
      const row=document.createElement('div');
      row.style.cssText='background:var(--redbg);border-radius:9px;padding:11px 12px;margin-bottom:8px;border-left:3px solid var(--red)';
      row.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:2px">${gm.i} ${gm.l}</div>
        <div style="font-size:11px;color:var(--t2);margin-bottom:7px">${gm.course} training recommended</div>
        <button class="btn bp" style="font-size:10px;padding:5px 11px" onclick="reqTraining('${g}')">Request this training →</button>`;
      ic.appendChild(row);
    });
    w.appendChild(ic);
  } else {
    const ok=document.createElement('div');ok.className='card';ok.style.marginBottom='12px';
    ok.style.textAlign='center';ok.style.padding='24px';
    ok.innerHTML=`<div style="font-size:32px;margin-bottom:8px">✅</div><div style="font-weight:700;color:var(--g)">Above target · Keep it up!</div>`;
    w.appendChild(ok);
  }

  // Next visit
  const nv=document.createElement('div');nv.className='card';
  nv.innerHTML=`<div style="font-size:12px;font-weight:700;margin-bottom:9px">Next trainer visit</div>
    <div style="background:var(--gl);border:1px solid var(--gb);border-radius:9px;padding:13px;text-align:center">
      <div style="font-size:15px;font-weight:800;color:var(--g);margin-bottom:2px">${D.sessions.find(s=>s.status==='planned')?new Date(D.sessions.find(s=>s.status==='planned').date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'Checking schedule...'}</div>
      <div style="font-size:11px;color:var(--gd)">${D.sessions.find(s=>s.status==='planned')?.course||'Contact your trainer for scheduling'}</div>
    </div>`;
  w.appendChild(nv);
  return w;
}

// ── TEAM ─────────────────────────────────────────────
function vTeam(){
  const w=document.createElement('div');w.style.animation='up .35s var(--ease) both';
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;font-weight:700">${CS.storeName} Team</div><div style="font-size:11px;color:var(--t3)">${CS.staffCount||'—'} staff</div></div>
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr>${['Name','Role','Status'].map(h=>`<th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;border-bottom:2px solid var(--border);text-align:left;text-transform:uppercase;letter-spacing:.07em">${h}</th>`).join('')}</tr></thead>
      <tbody id="team-body"></tbody>
    </table>`;
  w.appendChild(c);
  // Simulate team data — in production this comes from attendance API
  const ROLES=['SA','SA','SA','Senior SA','SIC','Optician','Optometrist','SA','SA','SA','SA'];
  const N=['Team Member 1','Team Member 2','Team Member 3','Team Member 4','Team Member 5','Team Member 6','Team Member 7','Team Member 8','Team Member 9','Team Member 10','Team Member 11'];
  const tbody=c.querySelector('#team-body');
  for(let i=0;i<Math.min(CS.staffCount||5,11);i++){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="padding:8px 9px;border-bottom:1px solid var(--bg2)">${N[i]||'Team Member'}</td><td style="padding:8px 9px;border-bottom:1px solid var(--bg2)"><span class="tag tx">${ROLES[i]||'SA'}</span></td><td style="padding:8px 9px;border-bottom:1px solid var(--bg2)"><span class="tag tg">Active</span></td>`;
    tbody.appendChild(tr);
  }
  return w;
}

// ── SESSIONS ─────────────────────────────────────────
function vSessions(){
  const w=document.createElement('div');w.style.animation='up .35s var(--ease) both';
  const sh=document.createElement('div');sh.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
  sh.innerHTML=`<div style="font-size:13px;font-weight:700">Training sessions</div>`;
  const rb=document.createElement('button');rb.className='btn bp';rb.style.fontSize='10px';rb.style.padding='6px 12px';rb.textContent='+ Request session';rb.onclick=()=>mRequest();
  sh.appendChild(rb);w.appendChild(sh);

  const stc={planned:'tb2',open:'tg',completed:'tg',cancelled:'tr',instore:'tg',classroom:'tb2',virtual:'tp'};
  if(!D.sessions.length){
    const empty=document.createElement('div');empty.className='card';empty.style.cssText='text-align:center;padding:32px';
    empty.innerHTML=`<div style="font-size:32px;margin-bottom:10px">📅</div><div style="font-weight:700;color:var(--t2);margin-bottom:4px">No sessions scheduled</div><div style="font-size:11px;color:var(--t3)">Contact your trainer or submit a request</div>`;
    w.appendChild(empty);
  } else {
    D.sessions.forEach((s,i)=>{
      const card=document.createElement('div');card.className='card';card.style.cssText=`margin-bottom:9px;border-left:3px solid ${s.status==='completed'?'var(--g)':s.status==='planned'?'var(--blue)':'var(--border)'}`;
      card.innerHTML=`
        <div style="font-size:13px;font-weight:700;margin-bottom:5px">${s.course}</div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:7px">📅 ${s.date||'TBD'} · ${s.time||''} · ⏱ ${s.duration||'2h'} · 👤 ${s.trainer_id||'Trainer'}</div>
        <div style="display:flex;gap:5px;align-items:center">
          <span class="tag ${stc[s.type||'instore']||'tx'}">${s.type||'instore'}</span>
          <span class="tag ${stc[s.status||'planned']||'tx'}">${s.status||'planned'}</span>
          <span style="font-size:10px;color:var(--t3)">👥 ${s.enrolled||0}/${s.capacity||20}</span>
        </div>`;
      w.appendChild(card);
    });
  }
  return w;
}

// ── REQUESTS ─────────────────────────────────────────
function vRequests(){
  const w=document.createElement('div');w.style.animation='up .35s var(--ease) both';
  const sh=document.createElement('div');sh.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
  sh.innerHTML=`<div style="font-size:13px;font-weight:700">Training requests</div>`;
  const rb=document.createElement('button');rb.className='btn bp';rb.style.fontSize='10px';rb.style.padding='6px 12px';rb.textContent='+ New request';rb.onclick=()=>mRequest();
  sh.appendChild(rb);w.appendChild(sh);

  const rsc={pending:'ta',in_progress:'tb2',completed:'tg'};
  if(!D.requests.length){
    const empty=document.createElement('div');empty.className='card';empty.style.cssText='text-align:center;padding:32px';
    empty.innerHTML=`<div style="font-size:32px;margin-bottom:10px">📩</div><div style="font-weight:700;color:var(--t2);margin-bottom:4px">No requests yet</div><div style="font-size:11px;color:var(--t3)">Submit a training request to your RTM</div>`;
    w.appendChild(empty);
  } else {
    D.requests.forEach(r=>{
      const card=document.createElement('div');card.className='card';card.style.marginBottom='9px';
      card.innerHTML=`<div style="display:flex;align-items:center;gap:9px"><div style="flex:1"><div style="font-size:12px;font-weight:700;margin-bottom:2px">${r.course}</div><div style="font-size:10px;color:var(--t3)">📅 ${r.preferred_date||'TBD'}</div>${r.notes?`<div style="font-size:11px;color:var(--t2);margin-top:3px">${r.notes}</div>`:''}</div><span class="tag ${rsc[r.status]||'tx'}">${(r.status||'pending').replace('_',' ')}</span></div>`;
      w.appendChild(card);
    });
  }
  return w;
}

// ── REQUEST MODAL ─────────────────────────────────────
function mRequest(prefillGap){
  const mo=document.createElement('div');mo.className='mo';mo.onclick=e=>{if(e.target===mo)mo.remove();};
  mo.innerHTML=`<div class="mo-box">
    <h3>Request a training session</h3><div class="mo-sub">Saved to Google Sheets — your RTM will schedule within 48 hours</div>
    <div class="mf"><label>Course *</label>
      <select class="inp" id="rq-c">
        <option value="Needs Discovery">Needs Discovery</option>
        <option value="Objection Handling">Objection Handling</option>
        <option value="Insurance Protocol">Insurance Protocol</option>
        <option value="CLARIVO Progressive Lens">CLARIVO Progressive Lens</option>
        <option value="Guest Experience">Guest Experience</option>
        <option value="Retail Induction">Retail Induction</option>
        <option value="Product Knowledge">Product Knowledge</option>
        <option value="Other">Other</option>
      </select></div>
    <div class="mf"><label>Preferred date</label><input class="inp" id="rq-d" type="date"></div>
    <div class="mf"><label>Number of staff</label><input class="inp" id="rq-s" type="number" placeholder="e.g. 8" value="${CS.staffCount||''}"></div>
    <div class="mf"><label>Notes (optional)</label><textarea class="inp" id="rq-n" rows="2" placeholder="Any context for your trainer..."></textarea></div>
    <div class="ma">
      <button class="btn bp" id="rq-sv" onclick="svRequest()">Submit request →</button>
      <button class="btn bg2" onclick="this.closest('.mo').remove()">Cancel</button>
    </div></div>`;
  if(prefillGap){const sel=mo.querySelector('#rq-c');if(sel)[...sel.options].forEach(o=>{if(o.value.toLowerCase().includes(prefillGap.split('_')[0]))o.selected=true;});}
  document.body.appendChild(mo);
}

async function svRequest(){
  const course=document.getElementById('rq-c')?.value;
  const date=document.getElementById('rq-d')?.value;
  const staff=document.getElementById('rq-s')?.value;
  const notes=document.getElementById('rq-n')?.value;
  if(!course){toast('Please select a course','err');return;}
  const sb=document.getElementById('rq-sv');sb.textContent='Submitting...';sb.style.opacity='.7';sb.style.pointerEvents='none';
  const res=await call('createRequest',{store_code:CS.storeCode||CS.store_code,sm_email:CS.smEmail||CS.sm_email||'',course,preferred_date:date,staff_count:staff,notes});
  if(res){
    D.requests.unshift({...res,status:'pending'});
    document.querySelector('.mo')?.remove();
    TAB='requests';render();
    toast('Request submitted ✓ — your RTM will respond within 48 hours','ok',4500);
  } else {
    sb.textContent='Submit request →';sb.style.opacity='';sb.style.pointerEvents='';
    toast('Failed — check connection and try again','err');
  }
}

async function reqTraining(gap){
  const gm=GAP[gap];
  const mo=document.createElement('div');mo.className='mo';mo.onclick=e=>{if(e.target===mo)mo.remove();};
  mo.innerHTML=`<div class="mo-box">
    <h3>Request: ${gm?.l||gap}</h3><div class="mo-sub">Saved to Google Sheets — RTM notified immediately</div>
    <div class="mf"><label>Preferred date</label><input class="inp" id="rt-d" type="date"></div>
    <div class="mf"><label>Notes (optional)</label><textarea class="inp" id="rt-n" rows="2" placeholder="Any context..."></textarea></div>
    <div class="ma">
      <button class="btn bp" id="rt-sv" onclick="svQuickReq('${gm?.course||gap}')">Submit request →</button>
      <button class="btn bg2" onclick="this.closest('.mo').remove()">Cancel</button>
    </div></div>`;
  document.body.appendChild(mo);
}

async function svQuickReq(course){
  const date=document.getElementById('rt-d')?.value;
  const notes=document.getElementById('rt-n')?.value;
  const sb=document.getElementById('rt-sv');sb.textContent='Submitting...';sb.style.opacity='.7';sb.style.pointerEvents='none';
  const res=await call('createRequest',{store_code:CS.storeCode||CS.store_code,sm_email:CS.smEmail||CS.sm_email||'',course,preferred_date:date,staff_count:CS.staffCount||'',notes});
  if(res){D.requests.unshift({...res,status:'pending'});document.querySelector('.mo')?.remove();toast('Request submitted ✓','ok',4000);}
  else{sb.textContent='Submit request →';sb.style.opacity='';sb.style.pointerEvents='';toast('Failed — check connection','err');}
}
</script>
