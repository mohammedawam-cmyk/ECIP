<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eyewa Store Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F0EE;color:#16161A;font-size:13px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit}
</style>
</head>
<body>
<div id="login-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#0a5c43,#1D9E75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px">
<div style="background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:400px">
<div style="font-size:30px;font-weight:900;color:#0a5c43">eyewa SM</div>
<input id="l-code" type="text" placeholder="Store code e.g. PAM" style="width:100%;border:2px solid #E6E6E2;border-radius:12px;padding:13px;font-size:14px;margin:16px 0 10px;outline:none">
<input id="l-pass" type="password" placeholder="Password" style="width:100%;border:2px solid #E6E6E2;border-radius:12px;padding:13px;font-size:14px;margin-bottom:16px;outline:none">
<div id="l-err" style="color:red;font-size:11px;margin-bottom:10px;display:none">Incorrect</div>
<button onclick="doLogin()" style="width:100%;padding:15px;background:#0a5c43;border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer">Enter →</button>
<div style="margin-top:14px;font-size:10px;color:#aaa;text-align:center">Password = store code lowercase. e.g. PAM → pam</div>
</div>
</div>
<div id="app" style="display:none">
<div style="background:#0a5c43;padding:14px 18px;color:#fff;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center">
<div>
<div style="font-size:14px;font-weight:800" id="topbar-store">Store</div>
<div style="font-size:10px;opacity:.7" id="topbar-sm">Manager</div>
</div>
<div style="display:flex;align-items:center;gap:10px">
<div style="font-size:26px;font-weight:900;font-family:monospace" id="topbar-conv">—%</div>
<button onclick="logout()" style="background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:10px;font-weight:600;cursor:pointer">Out</button>
</div>
</div>
<div style="display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #E6E6E2" id="tabs-nav">
<button onclick="switchTab('overview')" style="height:44px;padding:0 16px;background:none;border:none;border-bottom:2px solid #1D9E75;font-size:11px;font-weight:700;color:#0a5c43;cursor:pointer;white-space:nowrap">📊 Overview</button>
<button onclick="switchTab('team')" style="height:44px;padding:0 16px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap">👥 My Team</button>
<button onclick="switchTab('sessions')" style="height:44px;padding:0 16px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap">📅 Sessions</button>
<button onclick="switchTab('requests')" style="height:44px;padding:0 16px;background:none;border:none;border-bottom:2px solid transparent;font-size:11px;font-weight:700;color:#888;cursor:pointer;white-space:nowrap">📩 Requests</button>
</div>
<div style="padding:16px" id="main-content"></div>
</div>
<script>
const STORES={PAM:{name:'Panorama Mall',smName:'Sara Zaid Alanazi',pass:'pam',region:'Central',conv:{current:51,target:55,prevWeek:53},mandatory:72,staff:11,issues:['discovery_gap'],riskLevel:'medium'},REM:{name:'Red Sea Mall',smName:'Ahmed Abdullah Asiri',pass:'rem',region:'Western',conv:{current:40,target:55,prevWeek:43},mandatory:33,staff:10,issues:['onboarding_gap','discovery_gap'],riskLevel:'high_risk'},NKL:{name:'Nakheel Mall',smName:'TBA',pass:'nkl',region:'Central',conv:{current:42,target:55,prevWeek:40},mandatory:50,staff:9,issues:['objection_handling'],riskLevel:'high_risk'},MAD:{name:'Dareen Mall',smName:'Hadeel Alshorman',pass:'mad',region:'Eastern',conv:{current:44,target:55,prevWeek:46},mandatory:64,staff:9,issues:['discovery_gap'],riskLevel:'high_risk'},RPT:{name:'Riyadh Park',smName:'Yazan Alqarni',pass:'rpt',region:'Central',conv:{current:62,target:55,prevWeek:60},mandatory:88,staff:9,issues:[],riskLevel:'stable'},MOA:{name:'Mall of Arabia',smName:'Ahmed Shawish',pass:'moa',region:'Western',conv:{current:35,target:55,prevWeek:38},mandatory:42,staff:9,issues:['product_knowledge','onboarding_gap'],riskLevel:'high_risk'},KKA:{name:'King Khalid Airport',smName:'Sarah Alobaid',pass:'kka',region:'Central',conv:{current:64,target:55,prevWeek:62},mandatory:90,staff:8,issues:[],riskLevel:'top_performer'},GRD:{name:'Gulf Rd',smName:'Dina Aldossary',pass:'grd',region:'Eastern',conv:{current:49,target:55,prevWeek:50},mandatory:68,staff:8,issues:['engagement_gap'],riskLevel:'medium'}};
const IM={discovery_gap:{label:'Discovery Gap',color:'#D03535',bg:'#FDF0F0',icon:'🎯',course:'Needs Discovery'},objection_handling:{label:'Objection Handling',color:'#D03535',bg:'#FDF0F0',icon:'🛡',course:'Objection Handling'},product_knowledge:{label:'Product Knowledge',color:'#C07818',bg:'#FEF4E8',icon:'📦',course:'CLARIVO Lens'},engagement_gap:{label:'Engagement Gap',color:'#C07818',bg:'#FEF4E8',icon:'💬',course:'Guest Experience'},onboarding_gap:{label:'Onboarding Gap',color:'#6040D8',bg:'#EEEAFC',icon:'🆕',course:'Retail Induction'}};
let CS=null,CT='overview';
const SESSIONS=[{id:'S1',course:'CLARIVO Progressive Lens',date:'2026-05-05',time:'09:00',dur:'3h',type:'classroom',trainer:'Mohammad Othman',cap:15,enrolled:0,status:'open'},{id:'S2',course:'Guest Experience Phase 2',date:'2026-05-12',time:'14:00',dur:'2h',type:'instore',trainer:'Mohammad Othman',cap:12,enrolled:0,status:'planned'},{id:'S3',course:'Insurance Protocol',date:'2026-04-10',time:'18:00',dur:'3h',type:'virtual',trainer:'Mohammad Othman',cap:50,enrolled:8,status:'completed'}];
let REQS=[];
function doLogin(){const code=document.getElementById('l-code').value.trim().toUpperCase();const pass=document.getElementById('l-pass').value.trim();const s=STORES[code];if(s&&s.pass===pass){document.getElementById('l-err').style.display='none';CS={...s,code};document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';initApp();}else{document.getElementById('l-err').style.display='block';}}
function logout(){CS=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('l-code').value='';document.getElementById('l-pass').value='';}
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('l-code').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pass').focus();});
document.getElementById('l-code').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase();});
function initApp(){document.getElementById('topbar-store').textContent=CS.name;document.getElementById('topbar-sm').textContent=CS.smName+' · Store Manager';document.getElementById('topbar-conv').textContent=CS.conv.current+'%';renderTab('overview');}
function switchTab(t){CT=t;document.querySelectorAll('#tabs-nav button').forEach(b=>{b.style.borderBottomColor=b.onclick?.toString().includes("'"+t+"'")?'#1D9E75':'transparent';b.style.color=b.onclick?.toString().includes("'"+t+"'")?'#0a5c43':'#888';});renderTab(t);}
function renderTab(t){const m=document.getElementById('main-content');m.innerHTML='';if(t==='overview')renderOverview(m);else if(t==='team')renderTeam(m);else if(t==='sessions')renderSessions(m);else if(t==='requests')renderRequests(m);}
function card(inner){const d=document.createElement('div');d.style.cssText='background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #E6E6E2';d.innerHTML=inner;return d;}
function renderOverview(m){const gap=CS.conv.target-CS.conv.current;const trend=CS.conv.current-CS.conv.prevWeek;const rColors={high_risk:'#D03535',medium:'#C07818',stable:'#1D9E75',top_performer:'#2258C0'};const rc=rColors[CS.riskLevel]||'#888';const rLabels={high_risk:'🔴 High Risk',medium:'🟡 Medium',stable:'🟢 Stable',top_performer:'⭐ Top Performer'};m.innerHTML=`<div style="background:linear-gradient(135deg,#0a5c43,#1D9E75);border-radius:16px;padding:20px;margin-bottom:14px;color:#fff"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px"><div><div style="font-size:11px;opacity:.7;margin-bottom:4px">${CS.name} · ${CS.region}</div><div style="font-size:18px;font-weight:800;margin-bottom:6px">Conversion Dashboard</div><span style="font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.2);font-weight:700">${rLabels[CS.riskLevel]||CS.riskLevel}</span></div><div style="text-align:right"><div style="font-size:38px;font-weight:900;font-family:monospace;line-height:1">${CS.conv.current}%</div><div style="font-size:10px;opacity:.7">Target: ${CS.conv.target}%</div></div></div><div style="height:7px;background:rgba(255,255,255,.25);border-radius:7px;overflow:hidden;position:relative;margin-bottom:5px"><div style="height:100%;width:${(CS.conv.current/70)*100}%;background:rgba(255,255,255,.85);border-radius:7px"></div><div style="position:absolute;top:0;left:${(CS.conv.target/70)*100}%;width:2px;height:100%;background:rgba(255,255,255,.5)"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;opacity:.6"><span>0%</span><span>Target ${CS.conv.target}%</span><span>70%</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px">${[[CS.conv.current+'%','This week',rc],[CS.conv.prevWeek+'%','Last week','#888'],[CS.mandatory+'%','Mandatory','#6040D8'],[CS.staff+' staff','Team','#0a5c43']].map(([v,l,col])=>`<div style="background:#fff;border:1px solid #E6E6E2;border-radius:12px;padding:13px;text-align:center"><div style="font-size:20px;font-weight:800;color:${col};font-family:monospace">${v}</div><div style="font-size:9px;color:#888;margin-top:2px">${l}</div></div>`).join('')}</div>${CS.issues.length?`<div style="background:#fff;border:1px solid #E6E6E2;border-radius:14px;padding:16px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:10px">Why conversion is below target</div>${CS.issues.map(iss=>{const im=IM[iss];return im?`<div style="background:${im.bg};border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid ${im.color}"><div style="font-size:12px;font-weight:700;color:${im.color};margin-bottom:3px">${im.icon} ${im.label}</div><div style="font-size:11px;color:#44444C;margin-bottom:6px">${im.course} training recommended</div><button onclick="reqTraining('${iss}')" style="padding:6px 12px;background:#e8f5ef;color:#0a5c43;border:1px solid #4cc49a;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">Request this training →</button></div>`:''}).join('')}</div>`:'<div style="background:#e8f5ef;border:1px solid #4cc49a;border-radius:14px;padding:20px;text-align:center;margin-bottom:12px"><div style="font-size:28px;margin-bottom:6px">✅</div><div style="font-weight:700;color:#0a5c43">Above target · Keep it up!</div></div>'}<div style="background:#fff;border:1px solid #E6E6E2;border-radius:14px;padding:16px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;margin-bottom:10px">Next trainer visit</div><div style="background:#e8f5ef;border-radius:10px;padding:14px;border:1px solid #4cc49a;text-align:center"><div style="font-size:16px;font-weight:800;color:#0a5c43;margin-bottom:3px">May 5, 2026</div><div style="font-size:11px;color:#0a5c43">Mohammad Othman · CLARIVO Coaching</div></div></div>`;}
function renderTeam(m){const emps={PAM:[{name:'Wid Jafaari',role:'SA'},{name:'Haya Alsaleh',role:'SA'},{name:'Abdulmajeed Albakran',role:'Optometrist'},{name:'Ayman Murad',role:'Opt Tech'},{name:'Roqaya Almalki',role:'SA'},{name:'Sara Alanazi',role:'SIC'},{name:'Ghadeer Alzahrani',role:'ASM'},{name:'Rasha Alothman',role:'SA'},{name:'Abdualrhman Alotaibe',role:'Optometrist'},{name:'Rakan Al Hindawi',role:'SIC'},{name:'Maen Al Fayi',role:'Optometrist'}],REM:[{name:'Atheer Alshareef',role:'SA'},{name:'Mohamed Labib',role:'Opt Tech'},{name:'reman mohsen',role:'SA'},{name:'Thamer Babaydhan',role:'SA'},{name:'Ahmed Asiri',role:'SM'},{name:'Mohanad Alhaj',role:'Senior Optician'},{name:'Ghala Nasser',role:'SA'},{name:'Hanan Alkaidy',role:'SA'},{name:'Hadab Aljuhani',role:'SA'},{name:'Remas Asiri',role:'SA'}]};const myEmps=emps[CS.code]||[];m.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><div style="font-size:16px;font-weight:800">${CS.name}</div><div style="font-size:11px;color:#888">${CS.staff} staff · ${CS.region}</div></div><button onclick="showNominateModal()" style="padding:8px 14px;background:#0a5c43;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer">+ Nominate for session</button></div><div style="background:#fff;border:1px solid #E6E6E2;border-radius:14px;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr>${['Name','Role','Status'].map(c=>`<th style="font-size:9px;font-weight:700;color:#888;padding:8px 12px;border-bottom:1px solid #E6E6E2;text-align:left;text-transform:uppercase">${c}</th>`).join('')}</tr></thead><tbody>${(myEmps.length?myEmps:[{name:'Full team list loading...',role:'—'}]).map(e=>`<tr><td style="padding:9px 12px;border-bottom:1px solid #F0F0EE;font-weight:600;color:#16161A">${e.name}</td><td style="padding:9px 12px;border-bottom:1px solid #F0F0EE"><span style="font-size:9px;padding:2px 8px;border-radius:20px;background:#EDEDEA;color:#44444C;font-weight:700">${e.role}</span></td><td style="padding:9px 12px;border-bottom:1px solid #F0F0EE"><span style="font-size:9px;color:#1D9E75;font-weight:700">✓ Active</span></td></tr>`).join('')}</tbody></table></div>`;window.showNominateModal=()=>{const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px';o.onclick=e=>{if(e.target===o)o.remove();};o.innerHTML=`<div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:400px"><div style="font-size:17px;font-weight:800;margin-bottom:4px">Nominate for session</div><div style="font-size:11px;color:#888;margin-bottom:16px">Select a session to nominate your team</div><select id="nom-s" style="width:100%;border:2px solid #E6E6E2;border-radius:10px;padding:10px;font-size:13px;margin-bottom:14px">${SESSIONS.filter(s=>s.status!=='completed').map(s=>`<option>${s.date} · ${s.course}</option>`).join('')}</select><button onclick="this.closest('[style*=fixed]').remove();alert('Nomination submitted! Your trainer has been notified.')" style="width:100%;padding:13px;background:#0a5c43;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800;cursor:pointer">Nominate →</button></div>`;document.body.appendChild(o);};
}
function renderSessions(m){const cols={classroom:'#1D9E75',instore:'#8b5cf6',virtual:'#2258C0'};const icons={classroom:'🏫',instore:'🏪',virtual:'💻'};m.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:800">Training sessions</div><button onclick="showBookModal()" style="padding:8px 14px;background:#0a5c43;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer">+ Request session</button></div>${SESSIONS.map(s=>`<div style="background:#fff;border:1px solid #E6E6E2;border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid ${cols[s.type]||'#888'}"><div style="font-size:13px;font-weight:800;margin-bottom:4px">${s.course}</div><div style="font-size:10px;color:#888;margin-bottom:3px">📅 ${s.date} · ${s.time} · ⏱ ${s.dur}</div><div style="font-size:10px;color:#888;margin-bottom:6px">${icons[s.type]} ${s.type} · 🧑‍🏫 ${s.trainer}</div><div style="display:flex;gap:6px;align-items:center"><span style="font-size:9px;padding:2px 8px;border-radius:20px;background:${s.status==='completed'?'#e8f5ef':s.status==='open'?'#EDF2FD':'#EDEDEA'};color:${s.status==='completed'?'#0a5c43':s.status==='open'?'#2258C0':'#888'};font-weight:700">${s.status}</span><span style="font-size:10px;color:#888">👥 ${s.enrolled}/${s.cap}</span>${s.status!=='completed'?`<button onclick="alert('Staff nominator opening...');" style="padding:4px 10px;background:#e8f5ef;color:#0a5c43;border:1px solid #4cc49a;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">Nominate staff</button>`:'<span style="font-size:9px;color:#1D9E75;font-weight:700">✅ Completed</span>'}</div></div>`).join('')}`;window.showBookModal=()=>{const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px';o.onclick=e=>{if(e.target===o)o.remove();};o.innerHTML=`<div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:400px"><div style="font-size:17px;font-weight:800;margin-bottom:4px">Request a session</div><select style="width:100%;border:2px solid #E6E6E2;border-radius:10px;padding:10px;font-size:13px;margin:14px 0"><option>Needs Discovery</option><option>Objection Handling</option><option>Insurance Protocol</option><option>CLARIVO Lens</option><option>Guest Experience</option></select><input type="date" style="width:100%;border:2px solid #E6E6E2;border-radius:10px;padding:10px;font-size:13px;margin-bottom:14px"><button onclick="this.closest('[style*=fixed]').remove();alert('✅ Session request submitted! Your RTM will schedule within 48 hours.')" style="width:100%;padding:13px;background:#0a5c43;border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800;cursor:pointer">Submit request →</button></div>`;document.body.appendChild(o);};
}
function renderRequests(m){m.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:800">Training requests</div><button onclick="showBookModal()" style="padding:8px 14px;background:#0a5c43;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer">+ New request</button></div>${[{c:'Insurance refresher',s:'completed',d:'2026-04-10'},{c:'Rimless brand module',s:'in_progress',d:'2026-04-25'},...REQS].map(r=>`<div style="background:#fff;border:1px solid #E6E6E2;border-radius:14px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700;margin-bottom:3px">${r.c||r.course}</div>${r.d||r.date?`<div style="font-size:10px;color:#888">📅 ${r.d||r.date}</div>`:''}</div><span style="font-size:9px;padding:3px 9px;border-radius:20px;background:${r.s==='completed'?'#e8f5ef':r.s==='in_progress'?'#EDF2FD':'#FEF4E8'};color:${r.s==='completed'?'#0a5c43':r.s==='in_progress'?'#2258C0':'#C07818'};font-weight:700">${(r.s||'pending').replace('_',' ')}</span></div>`).join('')}`;
}
window.reqTraining=function(iss){const im=IM[iss];REQS.push({course:im?.course||iss,date:'',s:'pending'});alert('✅ Training request submitted!\n\n'+im?.course+'\n\nYour RTM will schedule within 48 hours.');renderTab('requests');renderTab(CT);};
</script>
</body>
</html>
